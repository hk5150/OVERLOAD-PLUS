              {split.days.map((d, i) => {
                const isNext = i === split.cursor % split.days.length; const editing = editDay === i;
                return (
                  <div key={i} style={{ background: C.surface, borderRadius: 14, padding: 14, marginBottom: 8, border: `1px solid ${isNext ? C.blue : C.border}` }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, minWidth: 0 }}>
                        <span style={{ color: C.muted, fontSize: 12, flexShrink: 0 }}>Day {i + 1}</span>
                        {editing ? <input value={d.name} onChange={e => updDay(i, { name: e.target.value })} onFocus={selectOnFocus} aria-label="Day名" style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, padding: "4px 8px", fontSize: 14, fontFamily: "inherit", width: "100%" }} /> : <strong style={{ fontSize: 15 }}>{d.name}</strong>}
                        {isNext && <span style={{ background: C.blue, color: "#fff", borderRadius: 999, padding: "2px 8px", fontSize: 10, fontWeight: 800, flexShrink: 0 }}>今日</span>}
                      </div>
                      <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                        {!isNext && <button onClick={() => updSplit({ cursor: i })} style={{ ...btn(C.surface2, C.muted), padding: "4px 10px", fontSize: 12 }}>今日はこれ</button>}
                        <button onClick={() => setEditDay(editing ? null : i)} style={{ ...btn(C.surface2, C.muted), padding: "4px 10px", fontSize: 12 }}>{editing ? "完了" : "編集"}</button>
                      </div>
                    </div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
                      {editing ? MUSCLES.map(m => <button key={m} onClick={() => toggleDayMuscle(i, m)} style={chip(d.muscles.includes(m))}>{m}</button>)
                        : d.muscles.length ? d.muscles.map(m => <span key={m} style={{ ...chip(false), cursor: "default" }}>{m}</span>)
                          : <span style={{ color: C.muted, fontSize: 12 }}>部位未設定(「編集」から選択)</span>}
                    </div>

                    {/* 種目の登録(この日の固定メニュー) */}
                    {editing ? (
                      <div style={{ marginTop: 12, background: C.bg, borderRadius: 10, padding: 10 }}>
                        <div style={{ fontSize: 12, color: C.muted, marginBottom: 8 }}>この日にやる種目(登録すると自動メニューになります)</div>
                        {(d.exercises && d.exercises.length > 0) && (
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 8 }}>
                            {d.exercises.map(n => (
                              <button key={n} onClick={() => toggleDayExercise(i, n)} style={{ ...chip(true, C.red) }}>{n} ✕</button>
                            ))}
                          </div>
                        )}
                        <div style={{ maxHeight: 160, overflowY: "auto" }}>
                          {EXERCISE_DB.filter(e => d.muscles.length === 0 || muscleMatchesDay(e.m, d)).map(e => {
                            const on = (d.exercises || []).includes(e.n);
                            return (
                              <button key={e.n} onClick={() => toggleDayExercise(i, e.n)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, width: "100%", textAlign: "left", background: on ? C.surface2 : "transparent", border: `1px solid ${on ? C.blue : C.border}`, borderRadius: 8, padding: "8px 10px", marginBottom: 5, cursor: "pointer", color: C.text, fontSize: 13, fontFamily: "inherit" }}>
                                <span style={{ minWidth: 0 }}>{on ? "✓ " : ""}{e.n}</span>
                                <span style={{ color: C.muted, fontSize: 11, flexShrink: 0 }}>{e.m}・{e.eq}</span>
                              </button>
                            );
                          })}
                          {d.muscles.length > 0 && EXERCISE_DB.filter(e => muscleMatchesDay(e.m, d)).length === 0 && (
                            <div style={{ color: C.muted, fontSize: 12, textAlign: "center", padding: 8 }}>この部位の内蔵種目がありません。</div>
                          )}
                        </div>
                      </div>
                    ) : (d.exercises && d.exercises.length > 0) && (
                      <div style={{ marginTop: 8, fontSize: 12, color: C.muted }}>
                        種目: {d.exercises.join("、")}
                      </div>
                    )}

                    {editing && <button onClick={() => removeDay(i)} style={{ ...btn("transparent", "#FF5A4E"), fontSize: 12, padding: "8px 0 0" }}>このDayを削除</button>}
                  </div>
                );
              })}
              <button onClick={addDay} style={{ ...btn(C.surface2, C.text), width: "100%", padding: 12, fontSize: 13, border: `1px dashed ${C.border}` }}>＋ Dayを追加</button>

              <div style={{ background: C.surface, borderRadius: 14, padding: 14, border: `1px solid ${C.border}`, marginTop: 16 }}>
                <h3 style={{ fontSize: 14, fontWeight: 900, margin: "0 0 10px" }}>直近7日間の部位別</h3>
                {Object.keys(weekly).length === 0 ? <div style={{ color: C.muted, fontSize: 13 }}>種目に部位を設定して記録すると集計されます。</div>
                  : Object.entries(weekly).sort((a, b) => b[1].vol - a[1].vol).map(([m, v]) => { const d = lastTrained(m); return (
                    <div key={m} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 6, gap: 8 }}>
                      <span>{m}</span>
                      <span style={{ color: C.muted, textAlign: "right" }}>
                        <span style={{ color: C.yellow, fontWeight: 700 }}>{v.sets}セット</span>
                        <span style={{ marginLeft: 8 }}>{Math.round(v.vol).toLocaleString()}kg</span>
                        {d != null && <span style={{ marginLeft: 8 }}>最終{d === 0 ? "今日" : `${d}日前`}</span>}
                      </span>
                    </div>
                  ); })}
              </div>
            </>
          )}
        </div>
      )}

      {/* ===== 履歴タブ ===== */}
      {view === "history" && (
        <div style={{ padding: "0 16px" }}>
          {workouts.length > 0 && (
            <>
              {/* ボリューム推移(トータル / 部位別) */}
              <div style={{ background: C.surface, borderRadius: 14, padding: 14, border: `1px solid ${C.border}`, marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, gap: 8 }}>
                  <h2 style={{ fontSize: 14, fontWeight: 900, margin: 0 }}>ボリューム推移</h2>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={() => setVolMode("total")} style={chip(volMode === "total")}>トータル</button>
                    <button onClick={() => setVolMode("muscle")} style={chip(volMode === "muscle")}>部位別</button>
                  </div>
                </div>

                {volMode === "total" ? (
                  volumeTrend.length >= 2 ? (
                    <ResponsiveContainer width="100%" height={170}>
                      <LineChart data={volumeTrend} margin={{ top: 8, right: 8, left: -6, bottom: 0 }}>
                        <CartesianGrid stroke={C.border} strokeDasharray="3 3" />
                        <XAxis dataKey="date" stroke={C.muted} fontSize={11} tickLine={false} />
                        <YAxis stroke={C.muted} fontSize={11} tickLine={false} width={44} />
                        <Tooltip contentStyle={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 10, fontSize: 12, color: C.text }} formatter={v => [`${v.toLocaleString()}kg`, "総ボリューム"]} />
                        <Line type="monotone" dataKey="総ボリューム" stroke={C.green} strokeWidth={2.5} dot={{ r: 3, fill: C.green }} />
                      </LineChart>
                    </ResponsiveContainer>
                  ) : <div style={{ color: C.muted, fontSize: 13, textAlign: "center", padding: "20px 0" }}>2回以上記録すると推移が表示されます。</div>
                ) : trainedMuscles.length === 0 ? (
                  <div style={{ color: C.muted, fontSize: 13, textAlign: "center", padding: "20px 0" }}>種目に部位を設定して記録すると部位別で表示されます。</div>
                ) : (
                  <>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
                      {trainedMuscles.map(m => <button key={m} onClick={() => setVolMuscle(m)} style={chip(volMuscle === m)}>{m}</button>)}
                    </div>
                    {muscleVolumeTrend.length >= 2 ? (
                      <ResponsiveContainer width="100%" height={170}>
                        <LineChart data={muscleVolumeTrend} margin={{ top: 8, right: 8, left: -6, bottom: 0 }}>
                          <CartesianGrid stroke={C.border} strokeDasharray="3 3" />
                          <XAxis dataKey="date" stroke={C.muted} fontSize={11} tickLine={false} />
                          <YAxis stroke={C.muted} fontSize={11} tickLine={false} width={44} />
                          <Tooltip contentStyle={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 10, fontSize: 12, color: C.text }} formatter={v => [`${v.toLocaleString()}kg`, volMuscle]} />
                          <Line type="monotone" dataKey="ボリューム" stroke={C.blue} strokeWidth={2.5} dot={{ r: 3, fill: C.blue }} />
                        </LineChart>
                      </ResponsiveContainer>
                    ) : <div style={{ color: C.muted, fontSize: 13, textAlign: "center", padding: "20px 0" }}>「{volMuscle}」を2回以上記録すると推移が表示されます。</div>}
                  </>
                )}
              </div>

              {/* 種目別 重量推移 */}
              <div style={{ background: C.surface, borderRadius: 14, padding: 14, border: `1px solid ${C.border}`, marginBottom: 16 }}>
                <h2 style={{ fontSize: 14, fontWeight: 900, margin: "0 0 10px" }}>種目別の重量推移</h2>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
                  {exerciseNames.map(name => <button key={name} onClick={() => setChartExercise(name)} style={chip(chartExercise === name)}>{name}</button>)}
                </div>
                {chartData.length >= 2 ? (
                  <ResponsiveContainer width="100%" height={200}>
                    <LineChart data={chartData} margin={{ top: 8, right: 8, left: -14, bottom: 0 }}>
                      <CartesianGrid stroke={C.border} strokeDasharray="3 3" />
                      <XAxis dataKey="date" stroke={C.muted} fontSize={11} tickLine={false} />
                      <YAxis stroke={C.muted} fontSize={11} tickLine={false} domain={["dataMin - 2", "dataMax + 2"]} />
                      <Tooltip contentStyle={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 10, fontSize: 12, color: C.text }} formatter={(v, n) => [n === "最大重量" ? `${v}kg` : `${v.toLocaleString()}kg`, n]} />
                      <Legend wrapperStyle={{ fontSize: 11, color: C.muted }} />
                      <Line type="monotone" dataKey="最大重量" stroke={C.red} strokeWidth={2.5} dot={{ r: 4, fill: C.red }} />
                      <Line type="monotone" dataKey="推定1RM" stroke={C.yellow} strokeWidth={2} strokeDasharray="4 3" dot={{ r: 3, fill: C.yellow }} />
                    </LineChart>
                  </ResponsiveContainer>
                ) : <div style={{ color: C.muted, fontSize: 13, textAlign: "center", padding: "24px 0" }}>この種目を2回以上記録するとグラフが表示されます。</div>}
              </div>
            </>
          )}

          {/* PR(自己ベスト)一覧 */}
          {Object.keys(prMap).length > 0 && (
            <div style={{ background: C.surface, borderRadius: 14, padding: 14, border: `1px solid ${C.border}`, marginBottom: 16 }}>
              <h2 style={{ fontSize: 14, fontWeight: 900, margin: "0 0 4px" }}>🏆 PR(自己ベスト)</h2>
              <p style={{ color: C.muted, fontSize: 11, margin: "0 0 10px" }}>推定1RM = 重量×(1+回数/30)。高回数ほど誤差が出るため目安です。</p>
              <div style={{ display: "flex", fontSize: 10, color: C.muted, marginBottom: 6 }}>
                <span style={{ flex: 1 }}>種目</span>
                <span style={{ width: 76, textAlign: "right" }}>推定1RM</span>
                <span style={{ width: 68, textAlign: "right" }}>最大重量</span>
              </div>
              {Object.entries(prMap).sort((a, b) => b[1].best1RM - a[1].best1RM).map(([name, pr]) => (
                <div key={name} style={{ display: "flex", alignItems: "center", fontSize: 13, marginBottom: 6 }}>
                  <span style={{ flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{name}</span>
                  <span style={{ width: 76, textAlign: "right", fontFamily: "'Barlow Condensed', sans-serif", fontSize: 17, fontWeight: 600, color: C.yellow }}>
                    {pr.best1RM.toFixed(1)}<span style={{ fontSize: 10, color: C.muted }}>kg</span>
                  </span>
                  <span style={{ width: 68, textAlign: "right", fontFamily: "'Barlow Condensed', sans-serif", fontSize: 15, color: C.muted }}>
                    {pr.bestWeight.toFixed(1)}<span style={{ fontSize: 10 }}>kg</span>
                  </span>
                </div>
              ))}
            </div>
          )}

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "8px 0 12px" }}>
            <h2 style={{ fontSize: 16, fontWeight: 900, margin: 0 }}>履歴 <span style={{ color: C.muted, fontWeight: 400, fontSize: 13 }}>{workouts.length}回</span></h2>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => { setHistMode("list"); setSelectedDate(null); }} style={chip(histMode === "list")}>リスト</button>
              <button onClick={() => setHistMode("calendar")} style={chip(histMode === "calendar")}>カレンダー</button>
            </div>
          </div>

          {/* カレンダー */}
          {histMode === "calendar" && (() => {
            const trainedDates = new Set(workouts.map(w => { const d = new Date(w.date); return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }));
            const first = new Date(calMonth.y, calMonth.m, 1);
            const startDow = first.getDay();
            const daysInMonth = new Date(calMonth.y, calMonth.m + 1, 0).getDate();
            const cells = [];
            for (let i = 0; i < startDow; i++) cells.push(null);
            for (let d = 1; d <= daysInMonth; d++) cells.push(d);
            const prevMonth = () => setCalMonth(c => c.m === 0 ? { y: c.y - 1, m: 11 } : { y: c.y, m: c.m - 1 });
            const nextMonth = () => setCalMonth(c => c.m === 11 ? { y: c.y + 1, m: 0 } : { y: c.y, m: c.m + 1 });
            const today = new Date();
            return (
              <div style={{ background: C.surface, borderRadius: 14, padding: 14, border: `1px solid ${C.border}`, marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                  <button onClick={prevMonth} style={{ ...btn(C.surface2, C.text), padding: "6px 12px", fontSize: 14 }}>‹</button>
                  <div style={{ fontWeight: 900, fontSize: 15 }}>{calMonth.y}年{calMonth.m + 1}月</div>
                  <button onClick={nextMonth} style={{ ...btn(C.surface2, C.text), padding: "6px 12px", fontSize: 14 }}>›</button>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
                  {["日", "月", "火", "水", "木", "金", "土"].map((d, i) => (
                    <div key={d} style={{ textAlign: "center", fontSize: 10, color: i === 0 ? C.red : i === 6 ? C.blue : C.muted, paddingBottom: 4 }}>{d}</div>
                  ))}
                  {cells.map((d, i) => {
                    if (d === null) return <div key={`e${i}`} />;
                    const key = `${calMonth.y}-${calMonth.m}-${d}`;
                    const trained = trainedDates.has(key);
                    const isToday = today.getFullYear() === calMonth.y && today.getMonth() === calMonth.m && today.getDate() === d;
                    const isSel = selectedDate === key;
                    return (
                      <button key={key} onClick={() => setSelectedDate(isSel ? null : key)}
                        style={{
                          aspectRatio: "1", borderRadius: 8, border: isToday ? `1px solid ${C.muted}` : "1px solid transparent",
                          background: isSel ? C.blue : trained ? "rgba(226,69,60,0.18)" : "transparent",
                          color: isSel ? "#fff" : C.text, fontSize: 13, fontFamily: "inherit", cursor: "pointer",
                          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2,
                        }}>
                        {d}
                        {trained && <span style={{ width: 5, height: 5, borderRadius: "50%", background: isSel ? "#fff" : C.red }} />}
                      </button>
                    );
                  })}
                </div>
                <div style={{ fontSize: 11, color: C.muted, marginTop: 10, textAlign: "center" }}>
                  {selectedDate ? "日付をもう一度タップで解除" : "赤い点=トレーニング日。タップでその日の記録を表示"}
                </div>
              </div>
            );
          })()}

          {!loaded && <div style={{ color: C.muted, fontSize: 14 }}>読み込み中…</div>}
          {loaded && workouts.length === 0 && <div style={{ border: `1px dashed ${C.border}`, borderRadius: 14, padding: 20, color: C.muted, fontSize: 14, textAlign: "center" }}>まだ記録がありません。</div>}
          {[...workouts].map((w, revIdx) => ({ w, idx: revIdx })).reverse()
            .filter(({ w }) => {
              if (!(histMode === "calendar" && selectedDate)) return true;
              const d = new Date(w.date);
              return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}` === selectedDate;
            })
            .map(({ w, idx }) => {
            const editing = editWorkout && editWorkout.index === idx;
            const d = editing ? editWorkout.draft : w;
            return (
            <div key={idx} style={{ background: C.surface, borderRadius: 14, padding: 14, marginBottom: 10, border: `1px solid ${editing ? C.blue : C.border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4, gap: 8 }}>
                <div style={{ fontWeight: 900, fontSize: 14, minWidth: 0 }}>{fmtDate(w.date)}{w.session && <span style={{ color: C.blue, marginLeft: 8, fontSize: 12 }}>{w.session}</span>}</div>
                <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                  {editing ? (
                    <>
                      <button onClick={saveEditWorkout} style={{ ...btn(C.red), padding: "5px 12px", fontSize: 12 }}>保存</button>
                      <button onClick={cancelEditWorkout} style={{ ...btn(C.surface2, C.muted), padding: "5px 10px", fontSize: 12 }}>取消</button>
                    </>
                  ) : (
                    <>
                      <button onClick={() => startEditWorkout(idx)} style={{ ...btn(C.surface2, C.muted), padding: "5px 10px", fontSize: 12 }}>編集</button>
                      <button onClick={() => deleteWorkout(idx)} aria-label="この記録を削除" style={{ ...btn("transparent", C.muted), padding: "5px 6px", fontSize: 12 }}>🗑</button>
                    </>
                  )}
                </div>
              </div>

              {!editing && (() => {
                const parts = [...new Set(w.exercises.map(ex => ex.muscle).filter(Boolean))];
                return parts.length > 0 ? (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 8 }}>
                    {parts.map(m => (
                      <span key={m} style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 999, padding: "3px 10px", fontSize: 11, color: C.text }}>{m}</span>
                    ))}
                  </div>
                ) : null;
              })()}

              {!editing && (w.startAt || w.durationMin) && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 10, fontSize: 11, color: C.muted, marginBottom: 8 }}>
                  {w.startAt && <span>{fmtTime(w.startAt)}〜{w.endAt ? fmtTime(w.endAt) : ""}</span>}
                  {w.durationMin != null && <span>{w.durationMin}分</span>}
                  <span style={{ color: C.yellow }}>{Math.round(w.exercises.reduce((a, ex) => a + exVolume(ex), 0)).toLocaleString()}kg</span>
                  {w.kcal != null && <span>約{w.kcal}kcal</span>}
                </div>
              )}

              {/* 表示モード */}
              {!editing && w.exercises.map((ex, j) => {
                const prevE = w.exercises[j - 1];
                const ssStart = ex.ssGroup && (!prevE || prevE.ssGroup !== ex.ssGroup);
                return (
                <div key={j} style={{ fontSize: 13, marginBottom: 8, paddingBottom: 6, borderBottom: j < w.exercises.length - 1 ? `1px solid ${C.border}` : "none" }}>
                  <div style={{ marginBottom: 2, lineHeight: 1.4 }}>
                    {ssStart && <span style={{ background: C.blue, color: "#fff", fontSize: 9, fontWeight: 800, borderRadius: 4, padding: "1px 6px", marginRight: 6 }}>SS</span>}
                    {ex.ssGroup && !ssStart && <span style={{ color: C.blue, marginRight: 6 }}>┗</span>}
                    {ex.name}
                    {ex.pain && <span style={{ color: "#FF5A4E", marginLeft: 4 }}>⚠</span>}
                    {ex.formBroke && <span style={{ color: C.yellow, marginLeft: 4 }}>△</span>}
                  </div>
                  <div style={{ color: C.muted, fontSize: 12, lineHeight: 1.6, wordBreak: "break-word" }}>
                    {ex.sets.map(s => `${s.warmup ? "W:" : ""}${s.assisted ? "補:" : ""}${s.weight}×${s.reps}${s.rir != null ? `(残${s.rir})` : ""}`).join(" / ")}
                  </div>
                </div>
                );
              })}

              {/* 編集モード */}
              {editing && (
                <div style={{ marginTop: 8 }}>
                  <div style={{ fontSize: 11, color: C.muted, marginBottom: 10 }}>
                    数値をタップして修正できます。回数を0にすると、そのセットは削除されます。
                  </div>
                  {d.exercises.map((ex, exIdx) => (
                    <div key={exIdx} style={{ background: C.bg, borderRadius: 10, padding: 10, marginBottom: 10 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, gap: 8 }}>
                        <strong style={{ fontSize: 13, minWidth: 0 }}>{ex.name}</strong>
                        <button onClick={() => editRemoveExercise(exIdx)} style={{ ...btn("transparent", C.muted), padding: 2, fontSize: 11, flexShrink: 0 }}>種目を削除</button>
                      </div>
                      <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 4 }}>
                        <span style={{ width: 22 }} />
                        <span style={{ flex: 1.3, ...fieldLabel }}>重量</span>
                        <span style={{ flex: 1, ...fieldLabel }}>回数</span>
                        <span style={{ flex: 1, ...fieldLabel }}>余力</span>
                        <span style={{ width: 24 }} />
                      </div>
                      {ex.sets.map((s, setIdx) => (
                        <div key={setIdx} style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 6 }}>
                          <button onClick={() => editSet(exIdx, setIdx, "warmup", !s.warmup)}
                            aria-label="ウォームアップ切替"
                            style={{ width: 22, height: 22, borderRadius: 6, flexShrink: 0, cursor: "pointer", fontSize: 10, fontWeight: 800, fontFamily: "inherit",
                              border: `1px solid ${s.warmup ? C.yellow : C.border}`, background: s.warmup ? C.yellow : "transparent", color: s.warmup ? "#141517" : C.muted }}>
                            {s.warmup ? "W" : setIdx + 1}
                          </button>
                          <input type="number" inputMode="decimal" step="0.5" min="0" value={s.weight} onFocus={selectOnFocus}
                            onChange={e => editSet(exIdx, setIdx, "weight", e.target.value)} aria-label="重量"
                            style={{ ...numInput, flex: 1.3, fontSize: 18, padding: "7px 2px" }} />
                          <input type="number" inputMode="numeric" step="1" min="0" value={s.reps} onFocus={selectOnFocus}
                            onChange={e => editSet(exIdx, setIdx, "reps", e.target.value)} aria-label="回数"
                            style={{ ...numInput, flex: 1, fontSize: 18, padding: "7px 2px" }} />
                          <input type="number" inputMode="numeric" step="1" min="0" max="4" value={s.rir} placeholder="–" onFocus={selectOnFocus}
                            onChange={e => editSet(exIdx, setIdx, "rir", e.target.value)} aria-label="余力"
                            style={{ ...numInput, flex: 1, fontSize: 18, padding: "7px 2px", color: C.yellow }} />
                          <button onClick={() => editRemoveSet(exIdx, setIdx)} aria-label="セットを削除"
                            style={{ width: 24, height: 24, borderRadius: 6, border: `1px solid ${C.border}`, background: C.surface2, color: C.muted, fontSize: 11, cursor: "pointer", flexShrink: 0 }}>✕</button>
                        </div>
                      ))}
                    </div>
                  ))}
                  <button onClick={() => deleteWorkout(idx)} style={{ ...btn("transparent", "#FF5A4E"), width: "100%", fontSize: 12, padding: 8, border: `1px solid ${C.border}`, borderRadius: 8 }}>
                    この日の記録をまるごと削除
                  </button>
                </div>
              )}
            </div>
            );
          })}
          {workouts.length > 0 && <button onClick={clearAll} style={{ ...btn("transparent", C.muted), fontSize: 12, padding: 8 }}>すべての履歴を削除</button>}
        </div>
      )}

      {/* ===== 設定タブ ===== */}
      {view === "settings" && (
        <div style={{ padding: "0 16px" }}>
          <h2 style={{ fontSize: 16, fontWeight: 900, margin: "8px 0 12px" }}>設定</h2>
          <div style={{ background: C.surface, borderRadius: 14, padding: 16, border: `1px solid ${C.border}`, marginBottom: 12 }}>
            <label style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 14 }}>
              体重(自重換算・カロリー計算に使用)
              <span><input type="number" step="0.5" value={profile.bodyweight} onFocus={selectOnFocus} onChange={e => persist({ profile: { ...profile, bodyweight: num(e.target.value) } })} style={{ ...cfgInput, width: 70, fontSize: 16 }} /> kg</span>
            </label>
          </div>

          {/* 通知音 */}
          <div style={{ background: C.surface, borderRadius: 14, padding: 16, border: `1px solid ${C.border}`, marginBottom: 12 }}>
            <label style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 14 }}>
              インターバルの通知音
              <button onClick={() => { const next = !soundOn; persist({ profile: { ...profile, soundOn: next } }); if (next) setTimeout(() => beep(1), 60); }}
                style={{ width: 52, height: 30, borderRadius: 999, border: "none", cursor: "pointer", background: soundOn ? C.green : C.grey, position: "relative" }}>
                <span style={{ position: "absolute", top: 3, left: soundOn ? 25 : 3, width: 24, height: 24, borderRadius: "50%", background: "#fff", transition: "left .15s" }} />
              </button>
            </label>
            <p style={{ color: C.muted, fontSize: 12, margin: "10px 0 0", lineHeight: 1.6 }}>
              インターバル中、1分・2分・3分…の経過時に音が鳴ります(経過が長いほど回数が増えます)。アプリを開いた後、最初のタップで音が有効になります。
              iPhoneでは本体のサイレントスイッチがオンだと鳴りません。
            </p>
          </div>

          {/* バックアップ */}
          <div style={{ background: C.surface, borderRadius: 14, padding: 16, border: `1px solid ${C.border}`, marginBottom: 12 }}>
            <div style={{ fontSize: 14, fontWeight: 900, marginBottom: 4 }}>バックアップ</div>
            <p style={{ color: C.muted, fontSize: 12, margin: "0 0 12px", lineHeight: 1.6 }}>
              記録・分割・カスタム種目・体重をまとめてファイルに保存できます。機種変更や、データが消えたときの復元に使えます。
            </p>
            {backupMsg && (
              <div style={{ background: "#1E3226", color: "#A8E6BC", borderRadius: 8, padding: 10, fontSize: 12, marginBottom: 10 }}>{backupMsg}</div>
            )}
            <button onClick={exportBackup} disabled={workouts.length === 0}
              style={{ ...btn(workouts.length === 0 ? C.surface2 : C.blue, workouts.length === 0 ? C.muted : "#fff"), width: "100%", padding: 14, fontSize: 14, marginBottom: 8 }}>
              ⬇ バックアップを書き出す(JSON)
            </button>

            <label style={{ ...btn(C.surface2, C.text), width: "100%", padding: 14, fontSize: 14, display: "block", textAlign: "center", marginBottom: 8, border: `1px solid ${C.border}` }}>
              ⬆ バックアップから復元する
              <input type="file" accept="application/json,.json" style={{ display: "none" }}
                onChange={e => { const f = e.target.files?.[0]; importBackup(f); e.target.value = ""; }} />
            </label>

            <button onClick={exportCSV} disabled={workouts.length === 0}
              style={{ ...btn("transparent", workouts.length === 0 ? C.border : C.muted), width: "100%", padding: 10, fontSize: 12, border: `1px solid ${C.border}` }}>
              CSVで書き出す(Excel等で開く用)
            </button>
            <p style={{ color: C.muted, fontSize: 11, margin: "10px 0 0", lineHeight: 1.6 }}>
              ※復元すると現在のデータはすべて置き換わります。復元前に念のため書き出しておくと安全です。
            </p>
          </div>

          <p style={{ color: C.muted, fontSize: 11, lineHeight: 1.6 }}>
            ※カロリーはMETs×体重×時間による概算の目安で、医療・栄養管理用の正確な値ではありません。自重種目のボリュームは体重×係数+加重で換算しています。
            シュラッグ・カーフレイズ・リストカールは可動域が小さいため、集計ボリュームを0.5倍で換算しています(推定1RM・PR・次回メニューの判定には影響しません)。種目ごとに⚙から調整できます。
          </p>
        </div>
      )}

      {/* ===== AIモーダル ===== */}
      {aiModal && (
        <div onClick={() => setAiModal(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.6)", zIndex: 50, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
          <div onClick={e => e.stopPropagation()} style={{ background: C.surface, borderTop: `3px solid ${C.blue}`, borderRadius: "16px 16px 0 0", padding: 20, width: "100%", maxWidth: 520, maxHeight: "70vh", overflowY: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <strong style={{ fontSize: 15 }}>🏋 {aiModal.title}</strong>
              <button onClick={() => setAiModal(null)} style={{ ...btn(C.surface2, C.muted), padding: "4px 12px", fontSize: 13 }}>閉じる</button>
            </div>
            <div style={{ fontSize: 14, lineHeight: 1.8, color: aiModal.loading ? C.muted : C.text, whiteSpace: "pre-wrap" }}>
              {aiModal.loading ? "AIが考えています…" : aiModal.body}
            </div>
          </div>
        </div>
      )}

      {/* タブバー */}
      <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, maxWidth: 520, margin: "0 auto", display: "flex", background: C.surface, borderTop: `1px solid ${C.border}`, paddingBottom: "env(safe-area-inset-bottom)" }}>
        {[["log", "記録"], ["suggest", "提案"], ["split", "分割"], ["history", "履歴"], ["settings", "設定"]].map(([k, label]) => (
          <button key={k} onClick={() => setView(k)} style={{ flex: 1, padding: "14px 0 18px", background: "none", border: "none", color: view === k ? C.red : C.muted, fontWeight: view === k ? 900 : 400, fontSize: 13, cursor: "pointer", fontFamily: "inherit", borderTop: view === k ? `2px solid ${C.red}` : "2px solid transparent" }}>{label}</button>
        ))}
      </nav>
    </div>
  );
}


// ---- マウント ----
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }
</script>

</body>
</html>
