<style>
  html, body { margin: 0; padding: 0; background: #141517; color: #F2F0EB; }
  body {
    font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: contain;
  }
  * { -webkit-tap-highlight-color: transparent; }
  #boot { padding-top: calc(24px + env(safe-area-inset-top)); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; gap: 14px; padding: 24px; text-align: center; }
  #boot .logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 34px; letter-spacing: 1px; }
  #boot .plus { color: #E2453C; }
  #boot .msg { color: #8E939A; font-size: 13px; line-height: 1.7; }
  #boot .err { color: #F5B8B3; background: #3A2224; border-radius: 10px; padding: 12px; font-size: 12px; text-align: left; max-width: 420px; word-break: break-all; line-height: 1.7; }
  #boot button { background: #E2453C; color: #fff; border: none; border-radius: 10px; padding: 12px 20px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .spinner { width: 22px; height: 22px; border: 2px solid #2E3237; border-top-color: #E2453C; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="root">
  <div id="boot">
    <div class="logo">OVERLOAD<span class="plus">+</span></div>
    <div class="spinner" id="spin"></div>
    <div class="msg" id="bootmsg">読み込み中…</div>
    <div class="err" id="booterr" style="display:none"></div>
    <button id="retry" style="display:none" onclick="location.reload(true)">再読み込み</button>
  </div>
</div>

<script>
  // ---- 起動診断 ----
  window.__boot = { react:false, recharts:false, babel:false, error:null };
  function bootMsg(t){ var e=document.getElementById('bootmsg'); if(e) e.textContent=t; }
  function bootFail(title, detail){
    var s=document.getElementById('spin'); if(s) s.style.display='none';
    bootMsg(title);
    var e=document.getElementById('booterr');
    if(e && detail){ e.style.display='block'; e.textContent=detail; }
    var r=document.getElementById('retry'); if(r) r.style.display='block';
  }
  window.addEventListener('error', function(ev){
    if (!document.getElementById('boot')) return;
    var m = ev.message || (ev.error && ev.error.message) || String(ev);
    bootFail('起動時にエラーが発生しました', m + (ev.filename ? ('\n' + ev.filename + ':' + ev.lineno) : ''));
  });

  // ---- ライブラリ読み込み(unpkg → 失敗時 jsdelivr) ----
  var LIBS = [
    { key:'react',    urls:['https://unpkg.com/react@18/umd/react.production.min.js',
                            'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js'] },
    { key:'reactdom', urls:['https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
                            'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js'] },
    { key:'proptypes',urls:['https://unpkg.com/prop-types@15/prop-types.min.js',
                            'https://cdn.jsdelivr.net/npm/prop-types@15/prop-types.min.js'] },
    { key:'recharts', urls:['https://unpkg.com/recharts@2.12.7/umd/Recharts.js',
                            'https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js'] },
    { key:'babel',    urls:['https://unpkg.com/@babel/standalone@7.24.7/babel.min.js',
                            'https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js'] }
  ];

  function loadOne(urls, i){
    return new Promise(function(resolve, reject){
      if (i >= urls.length) return reject(new Error('全ての配信元から読み込めません: ' + urls[0]));
      var s = document.createElement('script');
      s.src = urls[i];
      s.crossOrigin = 'anonymous';
      s.onload = resolve;
      s.onerror = function(){ loadOne(urls, i+1).then(resolve, reject); };
      document.head.appendChild(s);
    });
  }

  (async function(){
    try {
      bootMsg('ライブラリを読み込み中…');
      for (var k=0; k<LIBS.length; k++) { await loadOne(LIBS[k].urls, 0); }

      if (typeof React === 'undefined')     throw new Error('React を読み込めませんでした');
      if (typeof ReactDOM === 'undefined')  throw new Error('ReactDOM を読み込めませんでした');
      if (typeof Recharts === 'undefined')  throw new Error('Recharts を読み込めませんでした');
      if (typeof Babel === 'undefined')     throw new Error('Babel を読み込めませんでした');

      bootMsg('アプリを準備中…');
      var src = document.getElementById('appsrc').textContent;
      var out = Babel.transform(src, { presets: ['react'] }).code;
      // 実行
      (0, eval)(out);
    } catch (e) {
      bootFail('起動できませんでした', (e && e.message ? e.message : String(e)) +
        '\n\n※このページを Claude のプレビュー内で開いている場合、外部ライブラリが読み込めないため起動できません。GitHub Pages の URL から開いてください。');
    }
  })();
</script>

const store = {
  async get(key) {
    try { if (typeof window !== "undefined" && window.storage) { const r = await window.storage.get(key); if (r) return r; } } catch { /* fallthrough */ }
    try { const v = localStorage.getItem(key); return v != null ? { value: v } : null; } catch { return null; }
  },
  async set(key, value) {
    let ok = false;
    try { if (typeof window !== "undefined" && window.storage) { await window.storage.set(key, value); ok = true; } } catch { /* fallthrough */ }
    try { localStorage.setItem(key, value); ok = true; } catch { /* ignore */ }
    if (!ok) throw new Error("no storage available");
  },
  async del(key) {
    try { if (typeof window !== "undefined" && window.storage) await window.storage.delete(key); } catch { /* ignore */ }

  },

// シュラッグ/カーフレイズ/リストカール=0.5、その他=1.0。保存値(ユーザー調整)があれば優先。
const resolveRom = (name, storedRom) => {
  if (storedRom != null && !isNaN(storedRom) && storedRom > 0) return storedRom;
  const k = dbLookup(name);
  return k?.rom ?? 1.0;
};
// 1セットの実効重量(自重換算+加重、ダンベルは両手ぶん)を返す
// 推定1RM(Epley式): 重量 × (1 + 回数/30)。1回なら重量そのもの。
// 高回数ほど誤差が大きくなるため、12回超は目安として扱う。
const est1RM = (weight, reps) => {
  if (!weight || !reps || reps < 1) return 0;
  if (reps === 1) return weight;
  return weight * (1 + reps / 30);
};

function effWeight(weight, isDb, bwFactor, bodyweight) {
  let w = weight;
  if (bwFactor > 0) w = bodyweight * bwFactor + weight; // 自重+加重
  if (isDb) w = w * 2; // ダンベルは片手入力→両手
  return w;
}

// ================= ルールエンジン =================
function analyzeExercise(name, workouts) {
  const sessions = workouts.map(w => w.exercises.find(e => e.name === name)).filter(Boolean);
  if (sessions.length === 0) return { type: "insufficient_data", reason: "履歴がありません。" };
  const latest = sessions[sessions.length - 1];
  const cfg = {
    repLow: latest.repLow ?? 8, repHigh: latest.repHigh ?? 12,
    rirLow: latest.targetRirLow ?? 1, rirHigh: latest.targetRirHigh ?? 2, inc: latest.increment ?? 2.5,
  };
  // ワーキングかつ補助なしのセットのみを判定対象に(ウォームアップ・補助ありは増量判定から除外)
  const sets = (latest.sets || []).filter(s => !s.warmup && !s.assisted);
  if (sets.length === 0) {
    const working = (latest.sets || []).filter(s => !s.warmup);
    if (working.length > 0) {
      // 補助ありのみ → 重量・回数は据え置き(補助での伸びは増量に反映しない)
      const db0 = dbLookup(name);
      const inc0 = (latest.increment ?? 2.5) > 0 ? (latest.increment ?? 2.5) : 2.5;
      const w0 = Math.max(...working.map(s => s.weight));
      return {
        type: "maintain", reason: "補助ありのセットのみでした。補助での伸びは増量に反映せず、同重量で自力挙上を狙います。",
        prescription: {
          name, muscle: latest.muscle ?? db0?.m ?? "", bwFactor: latest.bwFactor ?? db0?.bw ?? 0,
          isDb: resolveIsDb(name, latest.isDb), rom: resolveRom(name, latest.rom),
          weight: Math.max(0, Math.round(w0 / inc0) * inc0),
          targetReps: working.map(s => s.reps), sets: working.length,
          repLow: latest.repLow ?? 8, repHigh: latest.repHigh ?? 12,
          targetRirLow: latest.targetRirLow ?? 1, targetRirHigh: latest.targetRirHigh ?? 2, increment: inc0,
        },
      };
    }
    return { type: "insufficient_data", reason: "ワーキングセットの記録がありません。" };
  }
  const topWeight = Math.max(...sets.map(s => s.weight));
  const reps = sets.map(s => s.reps);
  const totalReps = reps.reduce((a, b) => a + b, 0);
  const rirs = sets.map(s => s.rir).filter(r => r != null && !isNaN(r));
  const avgRir = rirs.length ? rirs.reduce((a, b) => a + b, 0) / rirs.length : null;
  const db = dbLookup(name);
  const inc = cfg.inc > 0 ? cfg.inc : 2.5;
  // 重量は増加幅(increment)の単位に丸める(2.5kg刻みのジムで62.3kg等が出ないように)
  const snap = (w) => Math.max(0, Math.round(w / inc) * inc);

  // targetReps は「セットごとの目標回数の配列」。UI側もこれを使う。
  const presc = (type, weight, targetReps, reason) => ({
    type, reason, prescription: {
      name, muscle: latest.muscle ?? db?.m ?? "", bwFactor: latest.bwFactor ?? db?.bw ?? 0,
      isDb: resolveIsDb(name, latest.isDb), rom: resolveRom(name, latest.rom),
      weight: snap(weight), targetReps, sets: targetReps.length,
      repLow: cfg.repLow, repHigh: cfg.repHigh, targetRirLow: cfg.rirLow, targetRirHigh: cfg.rirHigh, increment: inc,
    },
  });
  const fill = (n) => reps.map(() => n);            // 全セット同じ目標回数
  const keep = () => [...reps];                     // 前回と同じ回数を維持

  if (latest.pain) return presc("pain_warning", topWeight, keep(), "痛みの記録あり。負荷は上げず、必要なら種目を中止して専門家に相談を。");

  let stall = 0;
  for (let i = sessions.length - 1; i > 0; i--) {
    const cs = (sessions[i].sets || []).filter(s => !s.warmup && !s.assisted), ps = (sessions[i - 1].sets || []).filter(s => !s.warmup && !s.assisted);
    if (cs.length === 0 || ps.length === 0) break;
    const curTop = Math.max(...cs.map(s => s.weight)), prevTop = Math.max(...ps.map(s => s.weight));
    const curReps = cs.reduce((a, s) => a + s.reps, 0), prevReps = ps.reduce((a, s) => a + s.reps, 0);
    if (curTop === prevTop && curReps <= prevReps) stall++; else break;
  }
  const highFatigue = avgRir != null && avgRir <= 0.5;
  if (stall >= 2 || (stall >= 1 && highFatigue))
    return presc("deload_candidate", topWeight * 0.9, fill(cfg.repLow), `${stall + 1}回連続で停滞${highFatigue ? "・疲労も高い" : ""}。重量を約10%下げて仕切り直し。`);

  if (sessions.length >= 2) {
    const ps = (sessions[sessions.length - 2].sets || []).filter(s => !s.warmup && !s.assisted);
    if (ps.length > 0) {
      const prevTop = Math.max(...ps.map(s => s.weight)), prevTotal = ps.reduce((a, s) => a + s.reps, 0);
      if (topWeight >= prevTop && totalReps < prevTotal - 1)
        return presc("maintain", topWeight, keep(), "前回よりパフォーマンス低下。睡眠・疲労・食事を確認し、同重量で再挑戦。");
    }
  }

  const belowRir = rirs.length > 0 && rirs.some(r => r < cfg.rirLow);
  if (latest.formBroke || belowRir)
    return presc("technique_focus", topWeight, keep(),
      latest.formBroke ? "フォームが崩れた。重量は据え置き、可動域とテンポの再現性を優先。" : `余力が目標(あと${cfg.rirLow}回)を下回った。同重量でフォームを固める。`);

  // ルール1: 全セットで上限達成 → 増量し、下限回数から再スタート
  if (reps.every(r => r >= cfg.repHigh))
    return presc("weight_increase", topWeight + inc, fill(cfg.repLow), `全セットで${cfg.repHigh}回達成・余力とフォーム良好。+${inc}kgで${cfg.repLow}回から再スタート。`);

  // ルール2: 上限未達 → 重量維持のまま「合計+1回」。上限に届いていない最初のセットだけ+1する。
  const next = [...reps];
  const idx = next.findIndex(r => r < cfg.repHigh);
  if (idx >= 0) next[idx] = next[idx] + 1;
  return presc("reps_increase", topWeight, next,
    `回数範囲の上限(${cfg.repHigh}回)に未到達。重量は維持し、${idx + 1}セット目を1回増やして合計+1回。`);
}
