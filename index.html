  const [hideBackupNag, setHideBackupNag] = useState(false); // このセッション中は非表示
  const [editWorkout, setEditWorkout] = useState(null); // 編集中の記録 {index, draft}
  const [filterToday, setFilterToday] = useState(true);

  // タイマー
  const [startAt, setStartAt] = useState(null);   // セッション開始(ms)
  const [elapsed, setElapsed] = useState(0);
  const [restStartAt, setRestStartAt] = useState(null); // インターバル開始(ms)。null=停止中
  const [restElapsed, setRestElapsed] = useState(0);

  // AIモーダル
  const [aiModal, setAiModal] = useState(null); // {title, body, loading}

  // ---- 読み込み ----
  useEffect(() => {
    (async () => {
      try {
        const res = await store.get(STORAGE_KEY);
        if (res?.value) {
          const p = JSON.parse(res.value);
          // 旧部位名(広背筋/背中上部)を「背中」に正規化
          const migW = (ws) => (ws || []).map(w => ({ ...w, exercises: (w.exercises || []).map(ex => ({ ...ex, muscle: normMuscle(ex.muscle) })) }));
          const migSplit = (sp) => sp ? { ...sp, days: sp.days.map(d => ({ ...d, muscles: [...new Set((d.muscles || []).map(normMuscle))] })) } : null;
          if (Array.isArray(p)) setWorkouts(migW(p));
          else {
            setWorkouts(migW(p.workouts));
            setSplit(migSplit(p.split));
            setProfile({ bodyweight: p.profile?.bodyweight ?? 70, aiMode: false, soundOn: p.profile?.soundOn ?? true });
            setRecentNames(p.recentNames || []);
            setCustomExercises(p.customExercises || []);
            setExerciseNotes(p.exerciseNotes || {});
            setLastBackupAt(p.lastBackupAt || null);
          }
        }
      } catch { /* データなし */ }
      setLoaded(true);
    })();
  }, []);

  const persist = async (patch) => {
    const next = {
      workouts: patch.workouts ?? workouts,
      split: patch.split === undefined ? split : patch.split,
      profile: patch.profile ?? profile,
      recentNames: patch.recentNames ?? recentNames,
      customExercises: patch.customExercises ?? customExercises,
      exerciseNotes: patch.exerciseNotes ?? exerciseNotes,
      lastBackupAt: patch.lastBackupAt !== undefined ? patch.lastBackupAt : lastBackupAt,
    };
    if (patch.workouts !== undefined) setWorkouts(next.workouts);
    if (patch.split !== undefined) setSplit(next.split);
    if (patch.profile !== undefined) setProfile(next.profile);
    if (patch.recentNames !== undefined) setRecentNames(next.recentNames);
    if (patch.customExercises !== undefined) setCustomExercises(next.customExercises);
    if (patch.exerciseNotes !== undefined) setExerciseNotes(next.exerciseNotes);
    if (patch.lastBackupAt !== undefined) setLastBackupAt(next.lastBackupAt);
    try { await store.set(STORAGE_KEY, JSON.stringify(next)); }
    catch { setError("保存に失敗しました。通信環境を確認してください。"); }
  };

  // ---- 経過タイマー ----
  useEffect(() => {
    if (!startAt) return;
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - startAt) / 1000)), 1000);
    return () => clearInterval(id);
  }, [startAt]);

  // ---- 通知音(Web Audio。iOSは初回タップで解錠される) ----
  const soundOn = profile.soundOn !== false;
  const audioRef = useRef(null);
  const firedMinRef = useRef(0); // 何分の通知まで鳴らしたか(再レンダーでも保持)

  // iOSは「ユーザー操作」を経ないと音が出せない。最初のタップで無音を再生して解錠しておく。
  useEffect(() => {
    const unlock = () => {
      try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        if (!audioRef.current) audioRef.current = new Ctx();
        const ctx = audioRef.current;
        if (ctx.state === "suspended") ctx.resume();
        // 無音を1回鳴らして解錠を確定させる
        const osc = ctx.createOscillator(), g = ctx.createGain();
        g.gain.setValueAtTime(0.0001, ctx.currentTime);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.01);
      } catch { /* 無視 */ }
    };
    document.addEventListener("touchend", unlock, { once: true });
    document.addEventListener("click", unlock, { once: true });
    return () => {
      document.removeEventListener("touchend", unlock);
      document.removeEventListener("click", unlock);
    };
  }, []);

  const beep = (times = 1) => {
    if (!soundOn) return;
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      if (!audioRef.current) audioRef.current = new Ctx();
      const ctx = audioRef.current;
      const play = () => {
        for (let i = 0; i < times; i++) {
          const t = ctx.currentTime + 0.03 + i * 0.32;
          // 基音+倍音を重ねて、小さいスピーカーでも聞こえやすくする
          [880, 1320].forEach((freq, fi) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = fi === 0 ? "square" : "sine"; // 基音は矩形波でよく通る
            osc.frequency.setValueAtTime(freq, t);
            const peak = fi === 0 ? 0.9 : 0.4;
            gain.gain.setValueAtTime(0.0001, t);
            gain.gain.exponentialRampToValueAtTime(peak, t + 0.015);
            gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.26);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(t); osc.stop(t + 0.28);
          });
        }
      };
      if (ctx.state === "suspended") ctx.resume().then(play).catch(() => {});
      else play();
      if (navigator.vibrate) navigator.vibrate(times === 1 ? [300] : [200, 120, 200, 120, 200]);
    } catch { /* 音が出せない環境では無視 */ }
  };

  // ---- インターバルタイマー(カウントアップ・1分ごとに通知音) ----
  useEffect(() => {
    if (restStartAt == null) { firedMinRef.current = 0; return; }
    const tick = () => {
      const sec = Math.floor((Date.now() - restStartAt) / 1000);
      setRestElapsed(sec);
      const min = Math.floor(sec / 60);
      // 1秒ごとの判定で分の境界を飛ばしても、未通知の分を確実に鳴らす
      if (min > firedMinRef.current) {
        firedMinRef.current = min;
        beep(min === 1 ? 1 : Math.min(min, 3)); // 経過が長いほど回数を増やす
      }
    };
    // 500msごとに判定して1分の取りこぼしを減らす(表示は秒単位)
    const id = setInterval(tick, 500);
    tick();
    const onVisible = () => { if (document.visibilityState === "visible") tick(); };
    document.addEventListener("visibilitychange", onVisible);
    return () => { clearInterval(id); document.removeEventListener("visibilitychange", onVisible); };
  }, [restStartAt, soundOn]);

  const startRest = () => { setRestStartAt(Date.now()); setRestElapsed(0); firedMinRef.current = 0; }; // 記録入力のたびに0から再スタート
  const stopRest = () => { setRestStartAt(null); setRestElapsed(0); firedMinRef.current = 0; };

  // 記録開始時にセッションタイマー始動
  const ensureStarted = () => { if (!startAt) { setStartAt(Date.now()); setElapsed(0); } };

  // ---- 集計 ----
  const daysSince = (iso) => Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
  const lastTrained = (muscle) => {
    for (let i = workouts.length - 1; i >= 0; i--)
      if (workouts[i].exercises.some(e => e.muscle === muscle || e.muscle === "全身")) return daysSince(workouts[i].date);
    return null;
  };
  // 集計用ボリューム: 実効重量 × 回数 × 可動域係数(1RM/PR/判定には係数を掛けない)
  const setVolume = (ex, s) => effWeight(s.weight, resolveIsDb(ex.name, ex.isDb), ex.bwFactor ?? 0, ex.bwAtLog ?? profile.bodyweight) * s.reps * resolveRom(ex.name, ex.rom);
  // ボリューム・セット数はワーキングセットのみ(ウォームアップは除外)
  const workingSets = (ex) => (ex.sets || []).filter(s => !s.warmup);
  const exVolume = (ex) => workingSets(ex).reduce((a, s) => a + setVolume(ex, s), 0);

  // ---- PR(自己ベスト)と推定1RM ----
  // 実効重量(ダンベルは両手・自重は体重換算)ベースで比較する
  const setEff = (ex, s) => effWeight(s.weight, resolveIsDb(ex.name, ex.isDb), ex.bwFactor ?? 0, ex.bwAtLog ?? profile.bodyweight);
  // 種目ごとの自己ベスト: {best1RM, bestWeight, best1RMDate}
  const prMap = useMemo(() => {
    const m = {};
    workouts.forEach(w => w.exercises.forEach(ex => {
      workingSets(ex).forEach(s => {
        if (s.assisted) return; // 補助ありは自己ベストに含めない
        const eff = setEff(ex, s);
        const rm = est1RM(eff, s.reps);
        const cur = m[ex.name] || { best1RM: 0, bestWeight: 0, date: null };
        if (rm > cur.best1RM) { cur.best1RM = rm; cur.date = w.date; }
        if (eff > cur.bestWeight) cur.bestWeight = eff;
        m[ex.name] = cur;
      });
    }));
    return m;
  }, [workouts, profile.bodyweight]);

  // 記録中の種目の現在の最高推定1RM(PR更新判定に使う。補助ありは除外)
  const liveBest1RM = (ex) => {
    const isDb = resolveIsDb(ex.name, ex.isDb);
    return ex.sets.filter(s => !s.warmup && !s.assisted).reduce((max, s) => {
      const eff = effWeight(num(s.weight), isDb, ex.bwFactor || 0, profile.bodyweight);
      return Math.max(max, est1RM(eff, Math.round(num(s.reps))));
    }, 0);
  };

  // 直近7日 部位別 セット数+ボリューム
  const weekly = useMemo(() => {
    const acc = {}; const cutoff = Date.now() - 7 * 86400000;
    workouts.forEach(w => {
      if (new Date(w.date).getTime() < cutoff) return;
      w.exercises.forEach(ex => {
        if (!ex.muscle) return;
        if (!acc[ex.muscle]) acc[ex.muscle] = { sets: 0, vol: 0 };
        acc[ex.muscle].sets += workingSets(ex).length;
        acc[ex.muscle].vol += exVolume(ex);
      });
    });
    return acc;
  }, [workouts, profile.bodyweight]);

  const todayDay = split ? split.days[split.cursor % split.days.length] : null;
  const muscleMatchesDay = (muscle, day) => !!day && (day.muscles.includes("全身") || muscle === "全身" || day.muscles.includes(muscle));

  // 今日の暫定ボリューム(記録中・ウォームアップ除外・可動域係数あり)
  // 今日の暫定ボリューム: 「あと何回できた?」を入力したセットだけを完了とみなして集計
  // (重量・回数を打った時点では加算せず、余力の入力=そのセット完了 とする)
  const isDoneSet = (s) => !s.warmup && s.rir !== "" && s.rir != null;
  const liveVolume = useMemo(() => today.reduce((a, ex) => {
    const isDb = resolveIsDb(ex.name, ex.isDb);
    const rom = resolveRom(ex.name, ex.rom);
    return a + ex.sets.filter(isDoneSet).reduce((b, s) => b + effWeight(num(s.weight), isDb, ex.bwFactor || 0, profile.bodyweight) * Math.round(num(s.reps)) * rom, 0);
  }, 0), [today, profile.bodyweight]);

  // 比較基準は「同じセッション」の前回。分割中はPush同士・Pull同士で比べる(無ければ直近セッション)。
  const compareBase = useMemo(() => {
    if (workouts.length === 0) return null;
    const sameName = todayDay ? [...workouts].reverse().find(w => w.session === todayDay.name) : null;
    const w = sameName ?? workouts[workouts.length - 1];
    return {
      label: sameName ? `前回の${todayDay.name}` : "前回",
      volume: w.exercises.reduce((a, ex) => a + exVolume(ex), 0), // 保存値ではなく常に再計算
    };
  }, [workouts, split, profile.bodyweight]);

  // ---- 種目リスト(内蔵 + 保存済みカスタム) ----
  const allExercises = useMemo(() => [...EXERCISE_DB, ...customExercises], [customExercises]);
  const findExercise = (name) => allExercises.find(e => e.n === name) || dbLookup(name);
  const pickerList = useMemo(() => {
    const q = search.trim();
    if (q) return allExercises.filter(e => e.n.includes(q) || e.m.includes(q) || e.eq.includes(q));
    if (pickerMuscle) return allExercises.filter(e => e.m === pickerMuscle);
    // 既定: 最近使った順 → 今日の部位 → 残り
    const rank = (e) => {
      const r = recentNames.indexOf(e.n);
      if (r >= 0) return r;                       // 0..n 最近ほど小
      if (todayDay && muscleMatchesDay(e.m, todayDay)) return 1000;
      return 2000;
    };
    return [...allExercises].sort((a, b) => rank(a) - rank(b));
  }, [search, pickerMuscle, todayDay, recentNames, allExercises]);

  // ---- 種目設定の引き継ぎ ----
  const lastConfig = (name) => {
    for (let i = workouts.length - 1; i >= 0; i--) {
      const ex = workouts[i].exercises.find(e => e.name === name);
      if (ex) return {
        repLow: ex.repLow ?? 8, repHigh: ex.repHigh ?? 12, targetRirLow: ex.targetRirLow ?? 1, targetRirHigh: ex.targetRirHigh ?? 2,
        increment: ex.increment ?? 2.5, muscle: ex.muscle ?? dbLookup(name)?.m ?? "",
        bwFactor: ex.bwFactor ?? dbLookup(name)?.bw ?? 0, isDb: resolveIsDb(name, ex.isDb), rom: resolveRom(name, ex.rom),
        lastWeight: Math.max(...ex.sets.map(s => s.weight)),
      };
    }
    const db = findExercise(name);
    return {
      repLow: 8, repHigh: 12,
      targetRirLow: db ? (db.t === "C" ? 1 : 0) : 1, targetRirHigh: db ? (db.t === "C" ? 3 : 2) : 2,
      increment: 2.5, muscle: db?.m ?? customDraft.muscle ?? "", bwFactor: db?.bw ?? 0,
      isDb: db ? !!db.db : (customDraft.eq === "ダンベル"), rom: db?.rom ?? 1.0,
      lastWeight: null,
    };
  };

  // 種目名 → メニュー1項目(履歴があればルール判定、無ければ初回の既定値)
  const buildMenuItem = (name) => {
    const res = analyzeExercise(name, workouts);
    if (res.type !== "insufficient_data") return { type: res.type, reason: res.reason, prescription: res.prescription };
    const cfg = lastConfig(name);
    return {
      type: "new_start", reason: "初回。軽めの重量で動作を確認しましょう。",
      prescription: {
        name, muscle: cfg.muscle, bwFactor: cfg.bwFactor, isDb: cfg.isDb, rom: cfg.rom ?? 1.0,
        weight: cfg.lastWeight != null ? cfg.lastWeight : 0, targetReps: [DEFAULT_REPS, DEFAULT_REPS, DEFAULT_REPS], sets: 3,
        repLow: cfg.repLow, repHigh: cfg.repHigh, targetRirLow: cfg.targetRirLow, targetRirHigh: cfg.targetRirHigh, increment: cfg.increment,
      },
    };
  };

  // 今日のセッションの自動メニュー(分割に登録した種目 > 前回同セッション > 部位一致の履歴)
  const autoMenu = useMemo(() => {
    if (!todayDay) return [];
    let names = [];
    if (todayDay.exercises && todayDay.exercises.length) {
      names = [...todayDay.exercises];
    } else {
      const lastSame = [...workouts].reverse().find(w => w.session === todayDay.name);
      if (lastSame) names = lastSame.exercises.map(e => e.name);
      else {
        const seen = new Set();
        [...workouts].reverse().forEach(w => w.exercises.forEach(ex => {
          if (!seen.has(ex.name) && muscleMatchesDay(ex.muscle, todayDay)) seen.add(ex.name);
        }));
        names = [...seen];
      }
    }
    return names.map(buildMenuItem);
  }, [split, workouts]);

  const startAutoMenu = () => {
    ensureStarted();
    setToday(autoMenu.map(it => {
      const p = it.prescription;
      return { id: uid(), name: p.name, muscle: p.muscle, bwFactor: p.bwFactor, isDb: p.isDb, rom: p.rom ?? 1.0,
        repLow: p.repLow, repHigh: p.repHigh, targetRirLow: p.targetRirLow, targetRirHigh: p.targetRirHigh, increment: p.increment,
        formBroke: false, pain: false, sets: p.targetReps.map(r => ({ weight: String(p.weight), reps: String(r), rir: "", warmup: false })) };
    }));
  };

  // ---- 記録操作 ----
  const addExercise = (name, meta) => {
    const n = (name || "").trim(); if (!n) return;
    ensureStarted();
    const cfg = meta ? { ...lastConfig(n), ...meta } : lastConfig(n);
    const w = cfg.lastWeight != null ? String(cfg.lastWeight) : "0";
    // 内蔵にもカスタムにも無い種目は、カスタム種目として永続登録(次回以降も一覧に出る)
    const known = allExercises.some(e => e.n === n);
    const nextCustom = known ? customExercises : [...customExercises, {
      n, m: cfg.muscle || "", eq: meta?.eq || customDraft.eq || "その他",
      t: "C", db: !!cfg.isDb, bw: cfg.bwFactor || 0, custom: true,
    }];
    setToday(t => [...t, {
      id: uid(), name: n, repLow: cfg.repLow, repHigh: cfg.repHigh,
      targetRirLow: cfg.targetRirLow, targetRirHigh: cfg.targetRirHigh, increment: cfg.increment,
      muscle: cfg.muscle, bwFactor: cfg.bwFactor, isDb: cfg.isDb, rom: cfg.rom ?? 1.0, formBroke: false, pain: false,
      sets: [{ weight: w, reps: String(DEFAULT_REPS), rir: "", warmup: false }],
    }]);
    const nextRecent = [n, ...recentNames.filter(x => x !== n)].slice(0, 40);
    // 分割の今日のDayに種目テンプレがあり、まだ含まれていなければ追加して次回に引き継ぐ
    let splitPatch = {};
    if (split && todayDay) {
      const dayIdx = split.cursor % split.days.length;
      const day = split.days[dayIdx];
      if (day.exercises && day.exercises.length && !day.exercises.includes(n)) {
        const days = split.days.map((d, i) => i === dayIdx ? { ...d, exercises: [...d.exercises, n] } : d);
        splitPatch = { split: { ...split, days } };
      }
    }
    persist({ recentNames: nextRecent, ...(known ? {} : { customExercises: nextCustom }), ...splitPatch });
    setSearch(""); setCustomDraft({ muscle: "", eq: "ダンベル" });
  };
  const updEx = (id, patch) => setToday(today.map(ex => ex.id === id ? { ...ex, ...patch } : ex));
  const updateSet = (id, i, field, value) => setToday(today.map(ex => ex.id !== id ? ex : { ...ex, sets: ex.sets.map((s, j) => j === i ? { ...s, [field]: value } : s) }));
  // 重量・回数を±で増減(空欄は0扱い、負にはしない)
  const adjustSet = (id, i, field, delta) => setToday(today.map(ex => ex.id !== id ? ex : {
    ...ex, sets: ex.sets.map((s, j) => {
      if (j !== i) return s;
      const cur = num(s[field]);
      let v = Math.max(0, Math.round((cur + delta) * 100) / 100);
      return { ...s, [field]: String(v) };
    }),
  }));
  // このセットの重量・回数を次のセットにコピー(なければ新規セットを作ってコピー)
  const copyToNext = (id, i) => setToday(today.map(ex => {
    if (ex.id !== id) return ex;
    const src = ex.sets[i];
    const sets = [...ex.sets];
    if (i + 1 < sets.length) {
      sets[i + 1] = { ...sets[i + 1], weight: src.weight, reps: src.reps };
    } else {
      sets.push({ weight: src.weight, reps: src.reps, rir: "", warmup: !!src.warmup, ...(src.assisted ? { assisted: true } : {}) });
    }
    return { ...ex, sets };
  }));
  const addSet = (id) => setToday(today.map(ex => ex.id !== id ? ex : { ...ex, sets: [...ex.sets, { ...ex.sets[ex.sets.length - 1], rir: "", warmup: false }] }));
  const removeSet = (id, i) => setToday(today.map(ex => ex.id !== id ? ex : { ...ex, sets: ex.sets.filter((_, j) => j !== i) }).filter(ex => ex.sets.length > 0));
  // 分割の今日のDayに登録された種目を newName で置き換え(次回の自動メニューに反映)
  const updateSplitDayExercise = (oldName, newName) => {
    if (!split || !todayDay) return;
    const dayIdx = split.cursor % split.days.length;
    const day = split.days[dayIdx];
    if (!day.exercises || !day.exercises.includes(oldName)) return; // 登録種目でなければ何もしない
    const nextExercises = newName
      ? day.exercises.map(x => x === oldName ? newName : x)
      : day.exercises.filter(x => x !== oldName);
    // 重複を除去
    const deduped = [...new Set(nextExercises)];
    const days = split.days.map((d, i) => i === dayIdx ? { ...d, exercises: deduped } : d);
    persist({ split: { ...split, days } });
  };

  const removeExercise = (id) => {
    const ex = today.find(e => e.id === id);
    setToday(today.filter(e => e.id !== id));
    if (ex) updateSplitDayExercise(ex.name, null);
  };
  // 種目の並べ替え(dir: -1=上へ, +1=下へ)
  // 種目の差し替え(セット内容は維持したまま種目だけ変更)
  const swapExercise = (id, newName) => {
    const n = (newName || "").trim(); if (!n) return;
    const cfg = lastConfig(n);
    const oldEx = today.find(e => e.id === id);
    setToday(t => t.map(ex => ex.id !== id ? ex : {
      ...ex,
      name: n, muscle: cfg.muscle, bwFactor: cfg.bwFactor, isDb: cfg.isDb, rom: cfg.rom ?? 1.0,
      repLow: cfg.repLow, repHigh: cfg.repHigh,
      targetRirLow: cfg.targetRirLow, targetRirHigh: cfg.targetRirHigh, increment: cfg.increment,
    }));
    const nextRecent = [n, ...recentNames.filter(x => x !== n)].slice(0, 40);
    persist({ recentNames: nextRecent });
    if (oldEx) updateSplitDayExercise(oldEx.name, n); // 分割にも反映して次回引き継ぎ
    setSwapEx(null); setSwapSearch("");
  };
  const moveExercise = (id, dir) => setToday(t => {
    const i = t.findIndex(ex => ex.id === id);
    const j = i + dir;
    if (i < 0 || j < 0 || j >= t.length) return t;
    const next = [...t];
    [next[i], next[j]] = [next[j], next[i]];
    return next;
  });

  // ---- スーパーセット(グループ化) ----
  // 連続する種目に同じ ssGroup を付けて連結表示する。解除はグループを外すだけ。
  const toggleSuperset = (id) => setToday(t => {
    const i = t.findIndex(ex => ex.id === id);
    if (i <= 0) return t; // 先頭種目は上と結合できない
    const cur = t[i], prev = t[i - 1];
    const next = [...t];
    if (cur.ssGroup && cur.ssGroup === prev.ssGroup) {
      // すでに上と同じグループ → このセット以降を解除
      const g = cur.ssGroup;
      // このグループのうち i 以降を外す(i より前のグループはそのまま)
      for (let k = i; k < next.length && next[k].ssGroup === g; k++) {
        next[k] = { ...next[k], ssGroup: null };
      }
    } else {
      // 上の種目と結合。上が既にグループならそれに乗る、なければ新規グループ
      const g = prev.ssGroup || uid();
      next[i - 1] = { ...prev, ssGroup: g };
      next[i] = { ...cur, ssGroup: g };
    }
    return next;
  });
  // 記録中の種目が「同一スーパーセットグループの最後」かどうか
  const isLastInGroup = (idx) => {
    const ex = today[idx];
    if (!ex?.ssGroup) return true; // 単独種目は常に「最後」扱い(=入力後にインターバル開始)
    const nextEx = today[idx + 1];
    return !nextEx || nextEx.ssGroup !== ex.ssGroup;
  };

  // カロリー(METs×体重×時間, 目安)
  const estimateKcal = (min) => Math.round(5.0 * profile.bodyweight * (min / 60));

  const saveWorkout = async () => {
    if (today.length === 0) return;
    setSaving(true);
    const end = Date.now();
    const start = startAt ?? end;
    const durationMin = Math.max(1, Math.round((end - start) / 60000));
    const exercises = today.map(ex => ({
      name: ex.name, muscle: ex.muscle || "", bwFactor: ex.bwFactor || 0, isDb: resolveIsDb(ex.name, ex.isDb), rom: resolveRom(ex.name, ex.rom), bwAtLog: profile.bodyweight,
      repLow: num(ex.repLow) || 8, repHigh: num(ex.repHigh) || 12,
      targetRirLow: num(ex.targetRirLow), targetRirHigh: num(ex.targetRirHigh), increment: num(ex.increment) || 2.5,
      formBroke: !!ex.formBroke, pain: !!ex.pain,
      ...(ex.ssGroup ? { ssGroup: ex.ssGroup } : {}),
      // 回数が未入力(0)のセットは保存しない。空セットが「1回」として履歴に残り判定を汚すのを防ぐ。
      sets: ex.sets
        .filter(s => Math.round(num(s.reps)) > 0)
        .map(s => ({
          weight: num(s.weight), reps: Math.round(num(s.reps)), warmup: !!s.warmup,
          ...(s.assisted ? { assisted: true } : {}),
          ...(s.rir !== "" && s.rir != null ? { rir: num(s.rir) } : {}),
        })),
    })).filter(ex => ex.sets.length > 0); // 有効なセットが1つも無い種目は記録しない
    if (exercises.length === 0) {
      setError("回数が入力されたセットがありません。回数を入力してから保存してください。");
      setSaving(false);
      return;
    }
    const totalVolume = exercises.reduce((a, ex) => a + exVolume(ex), 0);
    const entry = {
      date: new Date(end).toISOString(), session: todayDay ? todayDay.name : undefined,
      startAt: new Date(start).toISOString(), endAt: new Date(end).toISOString(),
      durationMin, totalVolume, kcal: estimateKcal(durationMin), exercises,
    };
    const nextSplit = split ? { ...split, cursor: (split.cursor + 1) % split.days.length } : split;
    await persist({ workouts: [...workouts, entry], split: nextSplit });
    // 終了コメント
    if (AI_ENABLED) endCoachComment(entry);
    setToday([]); setSaving(false); setResult(null);
    setStartAt(null); setElapsed(0); stopRest();
    setView("history");
  };

  // ---- AI呼び出し(共通) ----
  const callAI = async (prompt, maxTokens = 400) => {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 25000); // 25秒でタイムアウト
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: maxTokens, messages: [{ role: "user", content: prompt }] }),
        signal: ctrl.signal,
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      return (data.content || []).map(i => i.text || "").join("").trim();
    } finally { clearTimeout(timer); }
  };

  const openAI = async (title, prompt, maxTokens) => {
    setAiModal({ title, body: "", loading: true });
    try {
      const t = await callAI(prompt, maxTokens);
      setAiModal({ title, body: t || "回答が空でした。もう一度お試しください。", loading: false });
    } catch (e) {
      const msg = e?.name === "AbortError"
        ? "AIの応答が時間内に返りませんでした。この環境ではAI機能が利用できない可能性があります(下記参照)。"
        : `AIの呼び出しに失敗しました(${e?.message || "不明なエラー"})。この環境ではAI機能が利用できない可能性があります。`;
      setAiModal({ title, body: msg + "\n\n※AI機能はブラウザ版(claude.ai)のアーティファクトで最も安定して動作します。アプリで動かない場合は、同じチャットをPCのブラウザで開いてお試しください。", loading: false });
    }
  };

  const startCoach = () => {
    const day = todayDay ? `今日は「${todayDay.name}」(${todayDay.muscles.join("、")})の日です。` : "";
    const last = workouts.length ? `前回のトレーニングは${daysSince(workouts[workouts.length - 1].date)}日前です。` : "初回のトレーニングです。";
    openAI("開始コーチ", `あなたは親しみやすいトレーニングコーチです。${day}${last}これから始めるユーザーへ、ウォームアップの一言と今日の心構えを、80字以内の日本語で1〜2文、前向きに声かけしてください。本文のみ。`);
  };
  const endCoachComment = (entry) => {
    const summary = entry.exercises.map(e => `${e.name}:${e.sets.map(s => `${s.weight}×${s.reps}`).join(",")}`).join(" / ");
    openAI("お疲れさま", `あなたは親しみやすいトレーニングコーチです。ユーザーが今日のトレーニングを完了しました。所要${entry.durationMin}分、総ボリューム${Math.round(entry.totalVolume).toLocaleString()}kg。内容: ${summary}。良かった点を1つ具体的に褒め、次回への一言を添えて、100字以内の日本語で温かくコメントしてください。数値の指示や新しいメニュー提案はしないこと。本文のみ。`);
  };
  const howToDo = (exName) => {
    const db = dbLookup(exName);
    openAI(`${exName} のやり方`, `トレーニング種目「${exName}」${db ? `(${db.m}・${db.eq})` : ""}のやり方を、初心者にもわかるように日本語で説明してください。①セットアップ ②動作 ③よくある間違い ④効かせるコツ の4点を、各1〜2文で簡潔に。合計250字以内。本文のみ。`, 500);
  };
  // YouTubeで種目のやり方動画を検索(APIキー不要・新しいタブで開く)
  const openYouTube = (exName) => {
    const q = encodeURIComponent(`${exName} やり方 フォーム`);
    window.open(`https://www.youtube.com/results?search_query=${q}`, "_blank", "noopener,noreferrer");
  };
  const askCoach = () => {
    const ctx = todayDay ? `今日は「${todayDay.name}」の日。` : "";
    const vol = liveVolume > 0 ? `現在の記録中ボリュームは${Math.round(liveVolume).toLocaleString()}kg。` : "";
    openAI("AIコーチ", `あなたは親しみやすいトレーニングコーチです。${ctx}${vol}ユーザーがトレーニング中に気軽に相談できるよう、今の状況に合わせた励ましと、あれば一般的なワンポイントアドバイスを、120字以内の日本語で返してください。本文のみ。`);
  };

  // ---- 提案 ----
  const generate = async () => {
    const names = [...new Set(workouts.flatMap(w => w.exercises.map(e => e.name)))];
    let items = names.map(n => analyzeExercise(n, workouts)).filter(r => r.type !== "insufficient_data");
    if (split && filterToday) { const f = items.filter(it => muscleMatchesDay(it.prescription.muscle, todayDay)); if (f.length) items = f; }
    if (items.length === 0) { setError("判定できる種目がありません。まず記録してください。"); return; }
    setError(""); setResult({ advice: "", items });
    if (!AI_ENABLED) return;
    setAiLoading(true);
    try {
      const summary = items.map(it => ({ name: it.prescription.name, judgment: it.type, next: `${it.prescription.weight}kg × ${repsLabel(it.prescription.targetReps)}` }));
      const text = await callAI(`あなたはストレングスコーチです。次回メニューの数値判定は既にルールエンジンで確定しています(下記)。数値を変えず、全体への短い総括を書くことだけが役割です。\n判定結果: ${JSON.stringify(summary)}\n${todayDay ? `今日のセッション: ${todayDay.name}` : ""}\n80字以内の日本語で総括を1文だけ。数値・種目の増減提案はしない。本文のみ。`, 300);
      if (text) setResult(prev => prev ? { ...prev, advice: text } : prev);
    } catch { /* コード判定のみ */ }
    setAiLoading(false);
  };
  const loadPrescription = () => {
    ensureStarted();
    setToday(result.items.map(it => {
      const p = it.prescription;
      return { id: uid(), name: p.name, muscle: p.muscle, bwFactor: p.bwFactor, isDb: p.isDb, rom: p.rom ?? 1.0,
        repLow: p.repLow, repHigh: p.repHigh, targetRirLow: p.targetRirLow, targetRirHigh: p.targetRirHigh, increment: p.increment,
        formBroke: false, pain: false, sets: p.targetReps.map(r => ({ weight: String(p.weight), reps: String(r), rir: "", warmup: false })) };
    }));
    setView("log");
  };

  // ---- 分割操作 ----
  const applyPreset = (preset) => {
    if (split && !window.confirm(`現在の分割「${split.name}」を「${preset.name}」に置き換えます。よろしいですか?(登録した種目・進行状況はリセットされます。記録履歴は残ります)`)) return;
    persist({ split: { name: preset.name, days: preset.days.map(d => ({ name: d.name, muscles: [...d.muscles] })), cursor: 0 } });
    setEditDay(null); setPickingSplit(false);
  };
  const newCustomSplit = () => {
    if (split && !window.confirm(`現在の分割「${split.name}」を破棄して、新しくゼロから作成します。よろしいですか?(記録履歴は残ります)`)) return;
    persist({ split: { name: "カスタム分割", days: [{ name: "Day 1", muscles: [] }], cursor: 0 } });
    setEditDay(0); setPickingSplit(false);
  };
  const updSplit = (patch) => persist({ split: { ...split, ...patch } });
  const updDay = (i, patch) => updSplit({ days: split.days.map((d, j) => j === i ? { ...d, ...patch } : d) });
  const toggleDayMuscle = (i, m) => { const d = split.days[i]; updDay(i, { muscles: d.muscles.includes(m) ? d.muscles.filter(x => x !== m) : [...d.muscles, m] }); };
  const toggleDayExercise = (i, name) => { const d = split.days[i]; const ex = d.exercises || []; updDay(i, { exercises: ex.includes(name) ? ex.filter(x => x !== name) : [...ex, name] }); };
  const addDay = () => updSplit({ days: [...split.days, { name: `Day ${split.days.length + 1}`, muscles: [] }] });
  const removeDay = (i) => { const days = split.days.filter((_, j) => j !== i); if (!days.length) { persist({ split: null }); setEditDay(null); return; } updSplit({ days, cursor: Math.min(split.cursor, days.length - 1) }); setEditDay(null); };
  const deleteSplit = () => { if (!window.confirm("分割設定を削除します。よろしいですか?(履歴は残ります)")) return; persist({ split: null }); setEditDay(null); };

  const clearAll = async () => {
    if (!window.confirm("すべての履歴を削除します。よろしいですか?")) return;
    try { await store.del(STORAGE_KEY); } catch { /* noop */ }
    setWorkouts([]); setSplit(null); setResult(null); setChartExercise(""); setRecentNames([]); setCustomExercises([]); setExerciseNotes({}); setLastBackupAt(null);
  };

  // ---- 履歴の編集・削除 ----
  const startEditWorkout = (index) => {
    const w = workouts[index];
    // 文字列にして編集しやすくする
    setEditWorkout({
      index,
      draft: {
        ...w,
        exercises: w.exercises.map(ex => ({
          ...ex,
          sets: ex.sets.map(s => ({
            weight: String(s.weight), reps: String(s.reps),
            rir: s.rir != null ? s.rir : "", warmup: !!s.warmup,
          })),
        })),
      },
    });
  };
  const cancelEditWorkout = () => setEditWorkout(null);

  const editSet = (exIdx, setIdx, field, value) => {
    setEditWorkout(ew => ({
      ...ew,
      draft: {
        ...ew.draft,
        exercises: ew.draft.exercises.map((ex, i) => i !== exIdx ? ex : {
          ...ex, sets: ex.sets.map((s, j) => j !== setIdx ? s : { ...s, [field]: value }),
        }),
      },
    }));
  };
  const editRemoveSet = (exIdx, setIdx) => {
    setEditWorkout(ew => ({
      ...ew,
      draft: {
        ...ew.draft,
        exercises: ew.draft.exercises
          .map((ex, i) => i !== exIdx ? ex : { ...ex, sets: ex.sets.filter((_, j) => j !== setIdx) })
          .filter(ex => ex.sets.length > 0),
      },
    }));
  };
  const editRemoveExercise = (exIdx) => {
    setEditWorkout(ew => ({
      ...ew,
      draft: { ...ew.draft, exercises: ew.draft.exercises.filter((_, i) => i !== exIdx) },
    }));
  };

  const saveEditWorkout = async () => {
    const { index, draft } = editWorkout;
    // 数値化し、回数0のセットと空の種目は除去
    const exercises = draft.exercises.map(ex => ({
      ...ex,
      sets: ex.sets
        .filter(s => Math.round(num(s.reps)) > 0)
        .map(s => ({
          weight: num(s.weight), reps: Math.round(num(s.reps)), warmup: !!s.warmup,
          ...(s.assisted ? { assisted: true } : {}),
          ...(s.rir !== "" && s.rir != null ? { rir: num(s.rir) } : {}),
        })),
    })).filter(ex => ex.sets.length > 0);

    if (exercises.length === 0) {
      if (!window.confirm("有効なセットがありません。この記録を削除しますか?")) return;
      const next = workouts.filter((_, i) => i !== index);
      await persist({ workouts: next });
      setEditWorkout(null);
      return;
    }
    const updated = { ...draft, exercises };
    // 総ボリュームを再計算(ウォームアップ・可動域係数を反映)
    updated.totalVolume = exercises.reduce((a, ex) => a + exVolume(ex), 0);
    const next = workouts.map((w, i) => i === index ? updated : w);
    await persist({ workouts: next });
    setEditWorkout(null);
  };

  const deleteWorkout = async (index) => {
    const w = workouts[index];
    if (!window.confirm(`${fmtDate(w.date)}の記録を削除します。よろしいですか?`)) return;
    const next = workouts.filter((_, i) => i !== index);
    await persist({ workouts: next });
    setEditWorkout(null);
  };

  // ---- バックアップ(書き出し / 復元) ----
  const downloadFile = (filename, text, type = "application/json") => {
    const blob = new Blob([text], { type: `${type};charset=utf-8` });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  const exportBackup = () => {
    const payload = {
      app: "OVERLOAD+", version: 1, exportedAt: new Date().toISOString(),
      workouts, split, profile, recentNames, customExercises, exerciseNotes,
      lastBackupAt: new Date().toISOString(),
    };
    const d = new Date();
    const stamp = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, "0")}${String(d.getDate()).padStart(2, "0")}`;
    downloadFile(`overload-backup-${stamp}.json`, JSON.stringify(payload, null, 2));
    persist({ lastBackupAt: new Date().toISOString() });
    setHideBackupNag(true);
    setBackupMsg(`バックアップを書き出しました(記録 ${workouts.length}件)。`);
  };

  const exportCSV = () => {
    const rows = [["日付", "セッション", "種目", "部位", "セット", "種別", "重量kg", "回数", "あと何回"]];
    workouts.forEach(w => {
      const d = new Date(w.date);
      const date = `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
      w.exercises.forEach(ex => ex.sets.forEach((s, i) => {
        rows.push([date, w.session || "", ex.name, ex.muscle || "", i + 1, s.warmup ? "W" : "ワーキング", s.weight, s.reps, s.rir ?? ""]);
      }));
    });
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(",")).join("\n");
    downloadFile(`overload-log-${Date.now()}.csv`, "\uFEFF" + csv, "text/csv");
    setBackupMsg("CSVを書き出しました(Excel等で開けます)。");
  };

  const importBackup = async (file) => {
    if (!file) return;
    try {
      const text = await file.text();
      const p = JSON.parse(text);
      const ws = p.workouts ?? (Array.isArray(p) ? p : null);
      if (!Array.isArray(ws)) throw new Error("形式が違います");
      if (!window.confirm(`バックアップを復元します(記録 ${ws.length}件)。\n現在のデータはすべて置き換わります。よろしいですか?`)) return;
      const migW = (arr) => arr.map(w => ({ ...w, exercises: (w.exercises || []).map(ex => ({ ...ex, muscle: normMuscle(ex.muscle) })) }));
      const next = {
        workouts: migW(ws),
        split: p.split ? { ...p.split, days: p.split.days.map(d => ({ ...d, muscles: [...new Set((d.muscles || []).map(normMuscle))] })) } : null,
        profile: { bodyweight: p.profile?.bodyweight ?? 70, aiMode: false, soundOn: p.profile?.soundOn ?? true },
        recentNames: p.recentNames || [],
        customExercises: p.customExercises || [],
        exerciseNotes: p.exerciseNotes || {},
        lastBackupAt: new Date().toISOString(),
      };
      await persist(next);
      setBackupMsg(`復元しました(記録 ${next.workouts.length}件)。`);
      setError("");
    } catch (e) {
      setBackupMsg("");
      setError(`復元に失敗しました(${e?.message || "ファイルを確認してください"})。`);
    }
  };

  const fmtDate = (iso) => { const d = new Date(iso); return `${d.getMonth() + 1}/${d.getDate()} (${"日月火水木金土"[d.getDay()]})`; };
  const fmtTime = (iso) => { const d = new Date(iso); return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`; };

  // ---- グラフ ----
  const exerciseNames = useMemo(() => { const s = new Set(); workouts.forEach(w => w.exercises.forEach(ex => s.add(ex.name))); return [...s]; }, [workouts]);
  const chartData = useMemo(() => {
    if (!chartExercise) return [];
    return workouts.map(w => {
      const ex = w.exercises.find(e => e.name === chartExercise); if (!ex) return null;
      const ws = workingSets(ex); if (ws.length === 0) return null;
      const d = new Date(w.date);
      const best = ws.reduce((max, s) => Math.max(max, est1RM(setEff(ex, s), s.reps)), 0);
      return {
        date: `${d.getMonth() + 1}/${d.getDate()}`,
        最大重量: Math.max(...ws.map(s => s.weight)),
        推定1RM: Math.round(best * 10) / 10,
      };
    }).filter(Boolean);
  }, [workouts, chartExercise, profile.bodyweight]);
  const volumeTrend = useMemo(() => workouts.map(w => {
    const d = new Date(w.date);
    return { date: `${d.getMonth() + 1}/${d.getDate()}`, 総ボリューム: Math.round(w.exercises.reduce((a, ex) => a + exVolume(ex), 0)) };
  }), [workouts, profile.bodyweight]);
  const trainedMuscles = useMemo(() => {
    const s = new Set(); workouts.forEach(w => w.exercises.forEach(ex => { if (ex.muscle) s.add(ex.muscle); })); return [...s];
  }, [workouts]);
  const muscleVolumeTrend = useMemo(() => {
    if (!volMuscle) return [];
    return workouts.map(w => {
      const exs = w.exercises.filter(ex => ex.muscle === volMuscle);
      if (exs.length === 0) return null;
      const d = new Date(w.date);
      return { date: `${d.getMonth() + 1}/${d.getDate()}`, ボリューム: Math.round(exs.reduce((a, ex) => a + exVolume(ex), 0)) };
    }).filter(Boolean);
  }, [workouts, volMuscle, profile.bodyweight]);
  useEffect(() => { if (!volMuscle && trainedMuscles.length) setVolMuscle(trainedMuscles[0]); }, [trainedMuscles, volMuscle]);
  useEffect(() => { if (!chartExercise && exerciseNames.length) setChartExercise(exerciseNames[0]); }, [exerciseNames, chartExercise]);

  const volDelta = compareBase ? liveVolume - compareBase.volume : null;

  // ---- バックアップ推奨の判定 ----
  // 記録が3件以上あり、①一度もバックアップしていない ②前回から30日以上経過 のいずれかで促す
  const backupNag = useMemo(() => {
    if (hideBackupNag || workouts.length < 3) return null;
    if (!lastBackupAt) return { days: null, text: "まだ一度もバックアップしていません。" };
    const days = Math.floor((Date.now() - new Date(lastBackupAt).getTime()) / 86400000);
    if (days >= 30) return { days, text: `前回のバックアップから${days}日経過しています。` };
    return null;
  }, [lastBackupAt, workouts.length, hideBackupNag]);

  // ================= 画面 =================
  const showBar = true; // 経過・ボリューム・インターバルは常時表示

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'Noto Sans JP', -apple-system, sans-serif", maxWidth: 520, margin: "0 auto", paddingBottom: 90 }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        input:focus, button:focus-visible, select:focus { outline: 2px solid ${C.yellow}; outline-offset: 2px; }
        * { box-sizing: border-box; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
      `}</style>

      {/* ===== 固定バー(タイマー+ボリューム) ===== */}
      {showBar && (
        <div style={{
          position: "sticky", top: 0, zIndex: 20, background: C.surface2, borderBottom: `1px solid ${C.border}`,
          padding: "10px 10px 12px", paddingTop: "calc(10px + env(safe-area-inset-top))",
        }}>
          <div style={{ display: "flex", alignItems: "stretch", gap: 6, maxWidth: 520, margin: "0 auto" }}>
            <div style={{ textAlign: "center", flexShrink: 0, minWidth: 62 }}>
              <div style={{ fontSize: 10, color: C.muted, marginBottom: 3 }}>経過</div>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 30, lineHeight: 1 }}>{fmtClock(elapsed)}</div>
            </div>

            <div style={{ flex: 1, minWidth: 0, textAlign: "center", borderLeft: `1px solid ${C.border}`, borderRight: `1px solid ${C.border}`, padding: "0 6px" }}>
              <div style={{ fontSize: 10, color: C.muted, marginBottom: 3, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                ボリューム{compareBase && liveVolume > 0 ? ` (vs ${compareBase.label})` : ""}
              </div>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 30, lineHeight: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                {Math.round(liveVolume).toLocaleString()}<span style={{ fontSize: 13, color: C.muted, marginLeft: 1 }}>kg</span>
              </div>
              {volDelta != null && liveVolume > 0 && (
                <div style={{ fontSize: 11, marginTop: 2, fontWeight: 700, color: volDelta >= 0 ? C.green : C.red }}>
                  {volDelta >= 0 ? "▲" : "▼"}{Math.abs(Math.round(volDelta)).toLocaleString()}
                </div>
              )}
            </div>

            {restStartAt != null ? (
              <div onClick={stopRest} style={{ textAlign: "center", cursor: "pointer", flexShrink: 0, minWidth: 74 }}>
                <div style={{ fontSize: 10, color: C.yellow, marginBottom: 3 }}>インターバル</div>
                <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 30, lineHeight: 1, color: C.yellow }}>
                  {fmtClock(restElapsed)}
                </div>
                <div style={{ fontSize: 9, color: C.muted, marginTop: 2 }}>タップで停止</div>
              </div>
            ) : (
              <button onClick={startRest} style={{
                ...btn(C.surface, C.text), padding: "0 12px", fontSize: 12, lineHeight: 1.35,
                flexShrink: 0, whiteSpace: "nowrap", border: `1px solid ${C.border}`,
              }}>
                インターバル<br />開始
              </button>
            )}
          </div>
        </div>
      )}

      <header style={{ padding: "16px 16px 12px", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 32, letterSpacing: 1, lineHeight: 1 }}>
            OVERLOAD<span style={{ color: C.red }}>+</span>
            <span style={{ fontFamily: "'Noto Sans JP', sans-serif", fontSize: 11, fontWeight: 700, color: C.green, marginLeft: 8, verticalAlign: "middle" }}>v23</span>
          </div>
        </div>
        {AI_ENABLED && (
          <button onClick={askCoach} style={{ ...btn(C.blue), padding: "8px 12px", fontSize: 13 }}>AIコーチ</button>
        )}
      </header>

      {error && <div style={{ margin: "0 16px 12px", padding: 12, borderRadius: 10, background: "#3A2224", color: "#F5B8B3", fontSize: 13 }}>{error}</div>}

      {/* バックアップ推奨バナー */}
      {backupNag && (
        <div style={{
          margin: "0 16px 12px", padding: 12, borderRadius: 10,
          background: "#3A3222", border: `1px solid ${C.yellow}`, display: "flex", gap: 10, alignItems: "flex-start",
        }}>
          <span style={{ fontSize: 16, flexShrink: 0, lineHeight: 1.3 }}>💾</span>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, color: C.text, lineHeight: 1.6, marginBottom: 8 }}>
              {backupNag.text}<br />
              <span style={{ color: C.muted, fontSize: 12 }}>
                記録は端末内にのみ保存されています。念のためファイルに書き出しておきましょう。
              </span>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => { setView("settings"); }} style={{ ...btn(C.yellow, "#141517"), padding: "7px 14px", fontSize: 13 }}>
                今すぐバックアップ
              </button>
              <button onClick={() => setHideBackupNag(true)} style={{ ...btn("transparent", C.muted), padding: "7px 10px", fontSize: 13 }}>
                あとで
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ===== 記録タブ ===== */}
      {view === "log" && (
        <div style={{ padding: "0 16px" }}>
          {todayDay && (
            <div style={{ background: C.surface, border: `1px solid ${C.blue}`, borderRadius: 14, padding: 14, marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontSize: 11, color: C.blue, fontWeight: 800 }}>今日のセッション(Day {split.cursor % split.days.length + 1}/{split.days.length}・{split.name})</div>
                {AI_ENABLED && <button onClick={startCoach} style={{ ...btn(C.surface2, C.muted), padding: "4px 10px", fontSize: 11 }}>開始コメント</button>}
              </div>
              <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 26, fontWeight: 800, margin: "4px 0 8px" }}>{todayDay.name}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {todayDay.muscles.map(m => { const d = lastTrained(m); return (
                  <span key={m} style={{ ...chip(false), cursor: "default", background: C.bg }}>{m}{d != null && <span style={{ color: C.yellow }}> ・{d === 0 ? "今日" : `${d}日前`}</span>}</span>
                ); })}
              </div>
            </div>
          )}

          {/* 今日の自動メニュー(分割があるとき、記録開始前に表示) */}
          {todayDay && today.length === 0 && autoMenu.length > 0 && (
            <div style={{ background: C.surface, borderRadius: 14, padding: 14, marginBottom: 14, border: `1px solid ${C.border}` }}>
              <div style={{ fontSize: 13, fontWeight: 900, marginBottom: 2 }}>今日のメニュー(自動)</div>
              <div style={{ fontSize: 11, color: C.muted, marginBottom: 10 }}>
                {todayDay.exercises && todayDay.exercises.length ? "マイ分割に登録した種目" : "前回までの記録"}をもとに、次回の重量・回数をルールで調整しました。
              </div>
              {autoMenu.map((it, i) => {
                const p = it.prescription;
                return (
                  <div key={i} style={{ marginBottom: 10, paddingBottom: 8, borderBottom: i < autoMenu.length - 1 ? `1px solid ${C.border}` : "none" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, marginBottom: 2 }}>
                      <span style={{ fontSize: 13, minWidth: 0, lineHeight: 1.4 }}>
                        {p.name}<span style={{ color: C.muted, fontSize: 11, marginLeft: 6 }}>{p.muscle}</span>
                      </span>
                      <span style={{ flexShrink: 0 }}><JudgeBadge type={it.type} /></span>
                    </div>
                    <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 18, fontWeight: 600 }}>
                      {p.weight}<span style={{ fontSize: 11, color: C.muted }}>{p.bwFactor > 0 ? "kg加重" : p.isDb ? "kg片手" : "kg"}</span>
                      {" × "}<span style={{ fontSize: 15 }}>{repsLabel(p.targetReps)}</span>
                    </div>
                  </div>
                );
              })}
              <button onClick={startAutoMenu} style={{ ...btn(C.red), width: "100%", padding: 14, fontSize: 15, marginTop: 6 }}>この内容で記録を開始</button>
            </div>
          )}

          <h2 style={{ fontSize: 16, fontWeight: 900, margin: "8px 0 12px" }}>今日の記録</h2>

          {today.length === 0 && (
            <div style={{ border: `1px dashed ${C.border}`, borderRadius: 14, padding: 20, color: C.muted, fontSize: 14, textAlign: "center", marginBottom: 16 }}>
              {todayDay && autoMenu.length > 0 ? "上の「今日のメニュー」から開始するか、下の一覧で種目を追加できます。" : "下の一覧から種目を追加して開始しましょう。"}
              {!split && <><br />「分割」タブでマイ分割法を作ると、今日のメニューが自動で提案されます。</>}
            </div>
          )}

          {today.map((ex, exIdx) => {
            const prevEx = today[exIdx - 1];
            const nextEx = today[exIdx + 1];
            const inGroup = !!ex.ssGroup;
            const groupStart = inGroup && (!prevEx || prevEx.ssGroup !== ex.ssGroup);
            const groupEnd = inGroup && (!nextEx || nextEx.ssGroup !== ex.ssGroup);
            // グループ内の順番(A/B/C…)
            let ssLetter = "";
            if (inGroup) {
              let n = 0;
              for (let k = exIdx; k >= 0 && today[k].ssGroup === ex.ssGroup; k--) n++;
              ssLetter = String.fromCharCode(64 + n); // 1→A
            }
            return (
            <div key={ex.id} style={{
              background: C.surface, padding: 14,
              border: `1px solid ${inGroup ? C.blue : C.border}`,
              borderTopWidth: inGroup && !groupStart ? 0 : 1,
              borderRadius: inGroup ? (groupStart ? "14px 14px 0 0" : groupEnd ? "0 0 14px 14px" : 0) : 14,
              marginBottom: inGroup && !groupEnd ? 0 : 12,
            }}>
              {groupStart && (
                <div style={{ display: "inline-block", background: C.blue, color: "#fff", fontSize: 10, fontWeight: 800, borderRadius: 6, padding: "2px 8px", marginBottom: 8 }}>
                  スーパーセット
                </div>
              )}
              <div style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 14, fontWeight: 700, lineHeight: 1.4, marginBottom: 6 }}>
                  {inGroup && <span style={{ color: C.blue, fontWeight: 800, marginRight: 6 }}>{ssLetter}.</span>}
                  {ex.name}
                  {ex.muscle && <span style={{ color: C.muted, fontSize: 11, fontWeight: 400, marginLeft: 6 }}>{ex.muscle}</span>}
                  {resolveIsDb(ex.name, ex.isDb) && <span style={{ color: C.muted, fontSize: 11, marginLeft: 4 }}>片手</span>}
                  {resolveRom(ex.name, ex.rom) < 1 && <span style={{ color: C.blue, fontSize: 10, marginLeft: 4 }}>ROM×{resolveRom(ex.name, ex.rom)}</span>}
                  {todayDay && ex.muscle && !muscleMatchesDay(ex.muscle, todayDay) && <span style={{ color: C.yellow, fontSize: 11, marginLeft: 6 }}>今日の部位外</span>}
                </div>
                {exIdx > 0 && (
                  <button onClick={() => toggleSuperset(ex.id)} style={{
                    ...btn(inGroup && prevEx && prevEx.ssGroup === ex.ssGroup ? C.blue : C.surface2, inGroup && prevEx && prevEx.ssGroup === ex.ssGroup ? "#fff" : C.muted),
                    padding: "4px 10px", fontSize: 11, marginBottom: 8,
                  }}>
                    {inGroup && prevEx && prevEx.ssGroup === ex.ssGroup ? "⛓ 上の種目とスーパーセット中(解除)" : "⛓ 上の種目とスーパーセットにする"}
                  </button>
                )}
                <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                  <button onClick={() => moveExercise(ex.id, -1)} disabled={exIdx === 0} aria-label="上へ移動"
                    style={{ ...btn(C.surface2, exIdx === 0 ? C.border : C.muted), padding: "4px 8px", fontSize: 12, cursor: exIdx === 0 ? "default" : "pointer" }}>▲</button>
                  <button onClick={() => moveExercise(ex.id, 1)} disabled={exIdx === today.length - 1} aria-label="下へ移動"
                    style={{ ...btn(C.surface2, exIdx === today.length - 1 ? C.border : C.muted), padding: "4px 8px", fontSize: 12, cursor: exIdx === today.length - 1 ? "default" : "pointer" }}>▼</button>
                  {AI_ENABLED && <button onClick={() => howToDo(ex.name)} style={{ ...btn(C.surface2, C.blue), padding: "4px 8px", fontSize: 12 }}>やり方</button>}
                  <button onClick={() => openYouTube(ex.name)} aria-label="YouTubeでフォームを検索" style={{ ...btn(C.surface2, C.red), padding: "4px 8px", fontSize: 11, fontWeight: 700 }}>YouTube</button>
                  <button onClick={() => { setSwapEx(swapEx === ex.id ? null : ex.id); setSwapSearch(""); }}
                    style={{ ...btn(C.surface2, swapEx === ex.id ? C.blue : C.muted), padding: "4px 9px", fontSize: 12 }}>変更</button>
                  <button onClick={() => setOpenCfg({ ...openCfg, [ex.id]: !openCfg[ex.id] })} style={{ ...btn(C.surface2, C.muted), padding: "4px 9px", fontSize: 12 }}>⚙</button>
                  <div style={{ flex: 1 }} />
                  <button onClick={() => removeExercise(ex.id)} aria-label="種目を削除" style={{ ...btn("transparent", C.muted), padding: "4px 6px", fontSize: 12 }}>✕ 削除</button>
                </div>
              </div>

              {/* 種目の差し替え(セット内容はそのまま) */}
              {swapEx === ex.id && (
                <div style={{ background: C.bg, borderRadius: 10, padding: 10, marginBottom: 10, border: `1px solid ${C.blue}` }}>
                  <div style={{ fontSize: 11, color: C.muted, marginBottom: 8 }}>
                    別の種目に差し替えます(入力済みのセット内容はそのまま引き継がれます)。
                  </div>
                  <input value={swapSearch} onChange={e => setSwapSearch(e.target.value)} placeholder="種目を検索"
                    style={{ width: "100%", background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, padding: "8px 10px", fontSize: 13, fontFamily: "inherit", marginBottom: 8 }} />
                  <div style={{ maxHeight: 180, overflowY: "auto" }}>
                    {allExercises
                      .filter(e => {
                        const q = swapSearch.trim();
                        if (e.n === ex.name) return false;
                        if (q) return e.n.includes(q) || e.m.includes(q) || e.eq.includes(q);
                        return ex.muscle ? e.m === ex.muscle : true; // 既定は同じ部位から
                      })
                      .slice(0, 40)
                      .map(e => (
                        <button key={e.n} onClick={() => swapExercise(ex.id, e.n)}
                          style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, width: "100%", textAlign: "left", background: "transparent", border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 10px", marginBottom: 5, cursor: "pointer", color: C.text, fontSize: 13, fontFamily: "inherit" }}>
                          <span style={{ minWidth: 0 }}>{e.n}</span>
                          <span style={{ color: C.muted, fontSize: 11, flexShrink: 0 }}>{e.m}・{e.eq}</span>
                        </button>
                      ))}
                  </div>
                  <button onClick={() => { setSwapEx(null); setSwapSearch(""); }} style={{ ...btn("transparent", C.muted), width: "100%", fontSize: 12, padding: 6, marginTop: 2 }}>キャンセル</button>
                </div>
              )}

              {/* 推定1RM と PR(自己ベスト) */}
              {(() => {
                const pr = prMap[ex.name];
                const live = liveBest1RM(ex);
                const best = pr?.best1RM || 0;
                const isPR = live > 0 && live > best + 0.01;
                if (live === 0 && best === 0) return null;
                return (
                  <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", background: C.bg, borderRadius: 8, padding: "6px 10px", marginBottom: 10 }}>
                    {live > 0 && (
                      <span style={{ fontSize: 11, color: C.muted }}>
                        推定1RM <strong style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 16, color: isPR ? C.green : C.text, marginLeft: 2 }}>{live.toFixed(1)}</strong>kg
                      </span>
                    )}
                    {best > 0 && (
                      <span style={{ fontSize: 11, color: C.muted }}>
                        PR <strong style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 16, color: C.yellow, marginLeft: 2 }}>{best.toFixed(1)}</strong>kg
                      </span>
                    )}
                    {isPR && (
                      <span style={{ background: C.green, color: "#fff", borderRadius: 999, padding: "2px 10px", fontSize: 11, fontWeight: 800 }}>
                        🏆 PR更新 +{(live - best).toFixed(1)}kg
                      </span>
                    )}
                  </div>
                );
              })()}

              {openCfg[ex.id] && (
                <div style={{ background: C.bg, borderRadius: 10, padding: 10, marginBottom: 10, display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center" }}>
                  <label style={{ fontSize: 12, color: C.muted }}>回数範囲 <input type="number" value={ex.repLow} style={cfgInput} onFocus={selectOnFocus} onChange={e => updEx(ex.id, { repLow: e.target.value })} /><span style={{ margin: "0 4px" }}>–</span><input type="number" value={ex.repHigh} style={cfgInput} onFocus={selectOnFocus} onChange={e => updEx(ex.id, { repHigh: e.target.value })} /></label>
                  <label style={{ fontSize: 12, color: C.muted }}>目標(あと)回 <input type="number" value={ex.targetRirLow} style={cfgInput} onFocus={selectOnFocus} onChange={e => updEx(ex.id, { targetRirLow: e.target.value })} /><span style={{ margin: "0 4px" }}>–</span><input type="number" value={ex.targetRirHigh} style={cfgInput} onFocus={selectOnFocus} onChange={e => updEx(ex.id, { targetRirHigh: e.target.value })} /></label>
                  <label style={{ fontSize: 12, color: C.muted }}>増加幅 <input type="number" step="0.5" value={ex.increment} style={cfgInput} onFocus={selectOnFocus} onChange={e => updEx(ex.id, { increment: e.target.value })} />kg</label>
                  <label style={{ fontSize: 12, color: C.muted }}>部位 <select value={ex.muscle} onChange={e => updEx(ex.id, { muscle: e.target.value })} style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, padding: "5px 6px", fontSize: 13, fontFamily: "inherit" }}><option value="">未設定</option>{MUSCLES.map(m => <option key={m} value={m}>{m}</option>)}</select></label>
                  <label style={{ fontSize: 12, color: C.muted, display: "flex", alignItems: "center", gap: 4 }}><input type="checkbox" checked={ex.bwFactor > 0} onChange={e => updEx(ex.id, { bwFactor: e.target.checked ? 0.7 : 0 })} />自重(体重換算)</label>
                  {ex.bwFactor > 0 && <label style={{ fontSize: 12, color: C.muted }}>体重係数 <input type="number" step="0.05" value={ex.bwFactor} style={cfgInput} onFocus={selectOnFocus} onChange={e => updEx(ex.id, { bwFactor: num(e.target.value) })} /></label>}
                  <label style={{ fontSize: 12, color: C.muted }}>
                    可動域係数 <input type="number" step="0.1" min="0.1" max="1" value={ex.rom ?? 1} style={cfgInput} onFocus={selectOnFocus} onChange={e => updEx(ex.id, { rom: num(e.target.value) || 1 })} />
                    <span style={{ fontSize: 10, marginLeft: 4 }}>(集計ボリュームのみ)</span>
                  </label>
                </div>
              )}

              <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 4 }}>
                <span style={{ width: 20 }} />
                <span style={{ flex: 1.3, ...fieldLabel }}>{ex.bwFactor > 0 ? "加重 kg" : resolveIsDb(ex.name, ex.isDb) ? "重量 kg/片手" : "重量 kg"}</span>
                <span style={{ flex: 1, ...fieldLabel }}>回数</span>
                <span style={{ flex: 2.4, ...fieldLabel }}>あと何回できた?</span>
                <span style={{ width: 26 }} />
              </div>

              {ex.sets.map((s, i) => {
                const wsIndex = ex.sets.slice(0, i + 1).filter(x => !x.warmup).length; // ワーキング通し番号
                const setKey = `${ex.id}:${i}`;
                const expanded = openSetKey === setKey;
                const inc = num(ex.increment) || 2.5;
                return (
                <div key={i} style={{ marginBottom: 8, background: expanded ? C.bg : "transparent", borderRadius: 10, padding: expanded ? 8 : 0 }}>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <button onClick={() => updateSet(ex.id, i, "warmup", !s.warmup)}
                      title="タップでウォームアップ/ワーキング切替"
                      aria-label={`セット${i + 1}を${s.warmup ? "ワーキング" : "ウォームアップ"}にする`}
                      style={{ width: 22, height: 22, borderRadius: 6, flexShrink: 0, cursor: "pointer", fontSize: 11, fontWeight: 800, fontFamily: "inherit",
                        border: `1px solid ${s.warmup ? C.yellow : C.border}`, background: s.warmup ? C.yellow : "transparent", color: s.warmup ? "#141517" : C.muted }}>
                      {s.warmup ? "W" : wsIndex}
                    </button>
                    <input type="number" inputMode="decimal" step="0.5" min="0" value={s.weight} placeholder="0" onFocus={selectOnFocus}
                      onBlur={() => { if ((num(s.weight) > 0 || num(s.reps) > 0) && isLastInGroup(exIdx)) startRest(); }}
                      onChange={e => updateSet(ex.id, i, "weight", e.target.value)} aria-label={`セット${i + 1}の重量`} style={{ ...numInput, flex: 1.3, opacity: s.warmup ? 0.6 : 1 }} />
                    <input type="number" inputMode="numeric" step="1" min="1" value={s.reps} placeholder="0" onFocus={selectOnFocus}
                      onBlur={() => { if ((num(s.weight) > 0 || num(s.reps) > 0) && isLastInGroup(exIdx)) startRest(); }}
                      onChange={e => updateSet(ex.id, i, "reps", e.target.value)} aria-label={`セット${i + 1}の回数`} style={{ ...numInput, flex: 1, opacity: s.warmup ? 0.6 : 1 }} />
                    <div style={{ flex: 2.4, opacity: s.warmup ? 0.35 : 1, pointerEvents: s.warmup ? "none" : "auto" }}>
                      <RirSelect value={s.rir === "" ? null : num(s.rir)} onChange={v => { updateSet(ex.id, i, "rir", v === "" ? "" : v); if (v !== "" && isLastInGroup(exIdx)) startRest(); }} />
                    </div>
                    <button onClick={() => setOpenSetKey(expanded ? null : setKey)} aria-label="このセットの調整"
                      style={{ width: 26, height: 26, borderRadius: 8, border: `1px solid ${expanded ? C.blue : C.border}`, background: expanded ? C.blue : C.surface2, color: expanded ? "#fff" : C.muted, fontSize: 13, cursor: "pointer", flexShrink: 0 }}>±</button>
                  </div>

                  {expanded && (
                    <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 8 }}>
                      {/* 重量の±(increment単位) */}
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontSize: 11, color: C.muted, width: 40, flexShrink: 0 }}>重量</span>
                        <button onClick={() => adjustSet(ex.id, i, "weight", -inc)} style={adjBtn}>-{inc}</button>
                        <button onClick={() => adjustSet(ex.id, i, "weight", -inc * 2)} style={adjBtn}>-{inc * 2}</button>
                        <button onClick={() => adjustSet(ex.id, i, "weight", inc * 2)} style={adjBtn}>+{inc * 2}</button>
                        <button onClick={() => adjustSet(ex.id, i, "weight", inc)} style={adjBtn}>+{inc}</button>
                      </div>
                      {/* 回数の± */}
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontSize: 11, color: C.muted, width: 40, flexShrink: 0 }}>回数</span>
                        <button onClick={() => adjustSet(ex.id, i, "reps", -1)} style={adjBtn}>-1</button>
                        <button onClick={() => adjustSet(ex.id, i, "reps", 1)} style={adjBtn}>+1</button>
                        <div style={{ flex: 1 }} />
                        <button onClick={() => copyToNext(ex.id, i)} style={{ ...adjBtn, flex: "none", padding: "6px 12px", color: C.blue, borderColor: C.blue }}>次のセットにコピー</button>
                      </div>
                      {/* 補助あり(1RM・PRに反映しない) */}
                      <button onClick={() => updateSet(ex.id, i, "assisted", !s.assisted)}
                        style={{ ...btn(s.assisted ? C.blue : C.surface2, s.assisted ? "#fff" : C.muted), padding: "7px 0", fontSize: 12, border: `1px solid ${s.assisted ? C.blue : C.border}` }}>
                        {s.assisted ? "✓ 補助あり(1RM・PR・増量判定に反映しない)" : "補助ありにする"}
                      </button>
                      <button onClick={() => removeSet(ex.id, i)} style={{ ...btn("transparent", "#FF5A4E"), padding: "4px 0", fontSize: 12 }}>このセットを削除</button>
                    </div>
                  )}
                </div>
                );
              })}
              <div style={{ fontSize: 10, color: C.muted, marginBottom: 8 }}>※ 左の番号タップでウォームアップ(W)。「±」で重量・回数の微調整・コピー・補助設定ができます。</div>

              <button onClick={() => { addSet(ex.id); }} style={{ ...btn(C.surface2, C.text), width: "100%", padding: 10, fontSize: 13, marginBottom: 8 }}>＋ セットを追加</button>

              {/* フォーム崩れ / 痛み・違和感 / メモ */}
              <div style={{ display: "flex", gap: 8 }}>
                {[["formBroke", "フォーム崩れ", C.yellow], ["pain", "痛み・違和感", "#FF5A4E"]].map(([k, label, col]) => (
                  <button key={k} onClick={() => updEx(ex.id, { [k]: !ex[k] })} style={{ flex: 1, padding: "8px 0", borderRadius: 8, cursor: "pointer", fontSize: 13, fontFamily: "inherit", border: `1px solid ${ex[k] ? col : C.border}`, background: ex[k] ? col : C.bg, color: ex[k] ? "#141517" : C.muted, fontWeight: ex[k] ? 800 : 500 }}>{ex[k] ? "✓ " : ""}{label}</button>
                ))}
                <button onClick={() => setOpenNote({ ...openNote, [ex.id]: !openNote[ex.id] })}
                  aria-label="種目メモ"
                  style={{ flex: 1, padding: "8px 0", borderRadius: 8, cursor: "pointer", fontSize: 13, fontFamily: "inherit",
                    border: `1px solid ${exerciseNotes[ex.name] ? C.yellow : C.border}`, background: C.bg,
                    color: exerciseNotes[ex.name] ? C.yellow : C.muted, fontWeight: exerciseNotes[ex.name] ? 800 : 500 }}>
                  📌 メモ{exerciseNotes[ex.name] ? "有" : ""}
                </button>
              </div>

              {/* 固定メモ(展開時に編集、保存済みなら常に内容を表示) */}
              {openNote[ex.id] ? (
                <div style={{ marginTop: 8 }}>
                  <div style={{ fontSize: 10, color: C.muted, marginBottom: 4 }}>この種目の固定メモ(次回も表示されます)</div>
                  <textarea
                    value={exerciseNotes[ex.name] || ""}
                    onChange={e => persist({ exerciseNotes: { ...exerciseNotes, [ex.name]: e.target.value } })}
                    placeholder="例:シート高さ4、肩甲骨を寄せる、グリップは肩幅より拳1つ外"
                    rows={2}
                    style={{ width: "100%", background: C.bg, border: `1px solid ${C.yellow}`, borderRadius: 8, color: C.text, padding: "8px 10px", fontSize: 13, fontFamily: "inherit", resize: "vertical", lineHeight: 1.6 }} />
                </div>
              ) : exerciseNotes[ex.name] ? (
                <div onClick={() => setOpenNote({ ...openNote, [ex.id]: true })}
                  style={{ display: "flex", gap: 6, marginTop: 8, background: C.bg, borderLeft: `3px solid ${C.yellow}`, borderRadius: 6, padding: "8px 10px", fontSize: 12, color: C.text, lineHeight: 1.6, whiteSpace: "pre-wrap", cursor: "pointer" }}>
                  <span style={{ flexShrink: 0 }}>📌</span>
                  <span style={{ minWidth: 0 }}>{exerciseNotes[ex.name]}</span>
                </div>
              ) : null}
            </div>
            );
          })}

          {/* 種目選択 */}
          <div style={{ background: C.surface, borderRadius: 14, padding: 14, border: `1px solid ${C.border}` }}>
            <input value={search} onChange={e => setSearch(e.target.value)} onFocus={selectOnFocus}
              onKeyDown={e => e.key === "Enter" && search.trim() && addExercise(search, findExercise(search.trim()) ? undefined : { muscle: customDraft.muscle, eq: customDraft.eq, isDb: customDraft.eq === "ダンベル", bwFactor: customDraft.eq === "自重" ? 0.7 : 0 })}
              placeholder="種目を検索(なければカスタム追加)"
              style={{ width: "100%", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", color: C.text, fontSize: 14, fontFamily: "inherit", marginBottom: 10 }} />

            {/* カスタム追加時の部位・器具設定 */}
            {search.trim() && !findExercise(search.trim()) && (
              <div style={{ background: C.bg, borderRadius: 10, padding: 10, marginBottom: 10 }}>
                <div style={{ fontSize: 12, color: C.muted, marginBottom: 8 }}>「{search.trim()}」をカスタム種目として追加</div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", marginBottom: 10 }}>
                  <select value={customDraft.muscle} onChange={e => setCustomDraft({ ...customDraft, muscle: e.target.value })} style={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, padding: "6px 8px", fontSize: 13, fontFamily: "inherit" }}>
                    <option value="">部位を選択</option>{MUSCLES.map(m => <option key={m} value={m}>{m}</option>)}
                  </select>
                  <select value={customDraft.eq} onChange={e => setCustomDraft({ ...customDraft, eq: e.target.value })} style={{ background: C.surface2, border: `1px solid ${C.border}`, borderRadius: 8, color: C.text, padding: "6px 8px", fontSize: 13, fontFamily: "inherit" }}>
                    {EQUIPMENT.map(q => <option key={q} value={q}>{q}</option>)}
                  </select>
                </div>
                <button onClick={() => addExercise(search, { muscle: customDraft.muscle, eq: customDraft.eq, isDb: customDraft.eq === "ダンベル", bwFactor: customDraft.eq === "自重" ? 0.7 : 0 })} style={{ ...btn(C.red), width: "100%", padding: 10, fontSize: 14 }}>この設定で追加</button>
              </div>
            )}

            {!search.trim() && (
              <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 6, marginBottom: 8 }}>
                <button onClick={() => setPickerMuscle(null)} style={{ ...chip(!pickerMuscle), flexShrink: 0 }}>{recentNames.length ? "最近使った順" : todayDay ? `今日(${todayDay.name})` : "すべて"}</button>
                {MUSCLES.filter(m => EXERCISE_DB.some(e => e.m === m)).map(m => (
                  <button key={m} onClick={() => setPickerMuscle(pickerMuscle === m ? null : m)} style={{ ...chip(pickerMuscle === m), flexShrink: 0 }}>{m}</button>
                ))}
              </div>
            )}

            {!(search.trim() && !findExercise(search.trim())) && (
              <div style={{ maxHeight: 240, overflowY: "auto" }}>
                {pickerList.map(e => (
                  <button key={e.n} onClick={() => addExercise(e.n)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, width: "100%", textAlign: "left", background: C.bg, border: `1px solid ${C.border}`, borderRadius: 10, padding: "10px 12px", marginBottom: 6, cursor: "pointer", color: C.text, fontSize: 13, fontFamily: "inherit" }}>
                    <span style={{ minWidth: 0 }}>{e.n}{recentNames.includes(e.n) && <span style={{ color: C.blue, fontSize: 10, marginLeft: 6 }}>最近</span>}</span>

      {/* ===== 提案タブ ===== */}
      {view === "suggest" && (

                </div>
              )}
            </>

      {/* ===== 分割タブ ===== */}
      {view === "split" && (
        <div style={{ padding: "0 16px" }}>

          {(!split || pickingSplit) ? (
            <>
              {pickingSplit && split && (
                <button onClick={() => setPickingSplit(false)} style={{ ...btn(C.surface2, C.muted), fontSize: 13, padding: "8px 12px", marginBottom: 12 }}>← 今の分割({split.name})に戻る</button>

              <p style={{ color: C.muted, fontSize: 12, margin: "0 0 10px" }}>パターンを選ぶか、ゼロから作成できます。{split && "(選ぶと今の分割は置き換わります)"}</p>
              {SPLIT_PRESETS.map(p => (
                <button key={p.name} onClick={() => applyPreset(p)} style={{ ...btn(C.surface, C.text), width: "100%", textAlign: "left", padding: 14, marginBottom: 8, border: `1px solid ${C.border}` }}>
                  <div style={{ fontWeight: 900, fontSize: 15, marginBottom: 4 }}>{p.name}</div>
                  <div style={{ color: C.muted, fontSize: 12, fontWeight: 400 }}>{p.days.map(d => d.name).join(" → ")}</div>
                </button>
              ))}
              <button onClick={newCustomSplit} style={{ ...btn(C.surface2, C.text), width: "100%", padding: 14, border: `1px dashed ${C.border}` }}>＋ カスタム分割をゼロから作る</button>
            </>
          ) : (
            <>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, gap: 8 }}>

                <button onClick={() => setPickingSplit(true)} style={{ ...btn(C.blue), fontSize: 12, padding: "6px 10px", flexShrink: 0 }}>変更 / 作り直す</button>
              </div>
